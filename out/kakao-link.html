/* styles/connectShell.css */
/* =============================================================
   굿닥 커넥트 웹뷰 — 공통 셸 (디자인 토큰 + 윈도우 셸/사이드내비)
   여러 커넥트 화면(진료항목 등록, 예약 신청 내역 등)이 공유한다.
   - /Users/goodoc/test 프로토타입의 colors_and_type.css(:root)와
     connect.css의 셸 부분을 이식.
   - 전역 누수 방지를 위해 원본 body 레벨 스타일은 .cn-artboard 래퍼로
     한정했고 리셋도 .cn-artboard 하위로 스코프.
   - 클래스 접두사(cn-)가 고유해 다른 페이지와 충돌하지 않음.
   ============================================================= */

/* ---- Design tokens (colors_and_type.css :root, @font-face 제외) ---- */
:root {
  --gray-10:  #F9FAFB;
  --gray-15:  #F4F6F8;
  --gray-20:  #F2F4F6;
  --gray-30:  #E5E8EB;
  --gray-40:  #D1D6DB;
  --gray-50:  #B0B8C1;
  --gray-60:  #8B95A1;
  --gray-70:  #6B7684;
  --gray-80:  #4E5968;
  --gray-90:  #31353F;
  --gray-100: #191F28;

  --blue-30:  #B3D5FF;
  --blue-60:  #0073FA;
  --blue-70:  #0061DB;
  --blue-80:  #0050B5;

  --red-60:   #FA4655;
  --red-70:   #EC3847;
  --red-80:   #D52130;

  --green-70: #41D293;
  --green-80: #1FA972;
  --orange-60:#F79009;

  --white: #FFFFFF;
  --black: #000000;
  --transparent: transparent;

  --alpha-gray-05: rgba(128, 135, 153, 0.05);
  --alpha-gray-10: rgba(128, 135, 153, 0.10);
  --alpha-gray-15: rgba(128, 135, 153, 0.15);
  --alpha-gray-20: rgba(128, 135, 153, 0.20);
  --alpha-gray-40: rgba(128, 135, 153, 0.40);
  --alpha-gray-60: rgba(128, 135, 153, 0.60);

  --alpha-blue-05: rgba(0, 115, 250, 0.05);
  --alpha-blue-10: rgba(0, 115, 250, 0.10);
  --alpha-blue-15: rgba(0, 115, 250, 0.15);
  --alpha-blue-20: rgba(0, 115, 250, 0.20);

  --alpha-red-05: rgba(250, 70, 85, 0.05);
  --alpha-red-10: rgba(250, 70, 85, 0.10);
  --alpha-red-15: rgba(250, 70, 85, 0.15);
  --alpha-red-20: rgba(250, 70, 85, 0.20);

  --shadow-toast: 0 2px 1px rgba(22, 24, 29, 0.02), 0 2px 8px rgba(22, 24, 29, 0.10);
  --shadow-toggle-knob: 0 0 6px rgba(0, 0, 0, 0.25);

  --font-sans: 'Pretendard', 'Pretendard Variable', -apple-system,
    BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}

/* ---- Artboard backdrop (원본 connect.css의 body 스타일을 래퍼로 한정) ---- */
.cn-artboard {
  font-family: var(--font-sans);
  background: #e7e9ee;
  color: var(--gray-100);
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 24px;
}
.cn-artboard *,
.cn-artboard *::before,
.cn-artboard *::after { box-sizing: border-box; }

/* ---- App window (1280 x 832 rounded webview frame) ---- */
.cn-screen {
  width: 1280px;
  min-height: 832px;
  background: var(--white);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 12px 40px rgba(22, 24, 29, 0.12);
  position: relative;
}

/* ---- Title bar (windows-style) ---- */
.cn-titlebar {
  height: 32px;
  background: #f3f3f3;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex: none;
}
.cn-ci { display: flex; align-items: center; gap: 4px; padding: 0 8px; height: 100%; }
.cn-ci-mark { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
.cn-ci-mark svg { display: block; }
.cn-ci-name { font: 500 13px/16px var(--font-sans); color: rgba(0, 0, 0, 0.9); padding: 0 8px 2px 4px; }
.cn-winctrls { display: flex; height: 100%; }
.cn-winbtn {
  width: 46px; height: 32px;
  border: 0; background: transparent;
  display: inline-flex; align-items: center; justify-content: center;
  color: rgba(0, 0, 0, 0.9); cursor: pointer;
}
.cn-winbtn:hover { background: rgba(0, 0, 0, 0.05); }
.cn-winbtn.close:hover { background: #e81123; color: #fff; }

/* ---- Body: nav + main ---- */
.cn-body { display: flex; align-items: stretch; flex: 1; min-height: 800px; }

/* ---- Side nav (250px) ---- */
.cn-nav { width: 250px; flex: none; background: #f2f4f7; position: relative; display: flex; flex-direction: column; }
.cn-nav-scroll { flex: 1; overflow: auto; }
.cn-nav-group { padding: 8px 0; display: flex; flex-direction: column; }
.cn-nav-header { height: 40px; display: flex; align-items: center; padding: 0 16px; font: 600 14px/20px var(--font-sans); color: rgba(0, 0, 0, 0.9); }
.cn-nav-item {
  height: 40px; width: 100%;
  border: 0; background: transparent;
  display: flex; align-items: center;
  padding: 0 16px; position: relative; cursor: pointer; text-align: left;
}
.cn-nav-item > .cn-nav-label { font: 400 14px/22px var(--font-sans); color: var(--gray-90); flex: 1; }
.cn-nav-item .cn-chevron { width: 12px; height: 12px; color: #808799; flex: none; display: inline-flex; align-items: center; justify-content: center; }
.cn-nav-item.sub { padding-left: 32px; }
.cn-nav-item.sub::before { content: ""; position: absolute; inset: 2px 4px; border-radius: 4px; pointer-events: none; }
.cn-nav-item.active::before { background: var(--alpha-gray-10); }
.cn-nav-item.active .cn-nav-label { color: var(--gray-90); }
.cn-nav-item:not(.active):not(.cn-nav-header):hover::before {
  content: ""; position: absolute; inset: 2px 4px;
  background: rgba(128, 135, 153, 0.06); border-radius: 4px; pointer-events: none;
}
.cn-nav-label-wrap { display: inline-flex; align-items: center; gap: 6px; flex: 1; }
.cn-beta {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0 5px; border-radius: 4px;
  background: var(--alpha-blue-10);
  font: 600 12px/18px var(--font-sans);
  color: var(--blue-80, #115fd4);
}
.cn-nav-divider { padding: 4px 0; }
.cn-nav-divider span { display: block; height: 1px; background: var(--gray-30); }
.cn-nav-footer { background: #f2f4f7; padding-bottom: 8px; display: flex; flex-direction: column; }

/* ---- Main frame ---- */
.cn-main { flex: 1; min-width: 0; background: var(--white); display: flex; flex-direction: column; }
.cn-header { padding: 48px 64px 32px; }
.cn-header-title { font: 700 28px/36px var(--font-sans); color: #16181d; }
.cn-header-desc { font: 400 14px/22px var(--font-sans); color: #808799; margin-top: 6px; }


/* styles/connectKakaoLink.css */
/* =============================================================
   진료항목 → 카카오 예약하기 상품 자동 연동 (kakao-link) 화면 전용 CSS
   connectShell.css 토큰(:root) 사용. 클래스 접두사 kl-.
   ============================================================= */

.kl-main { position: relative; }
.kl-sub { font: 400 13px/20px var(--font-sans); color: var(--gray-60); margin-top: 4px; }

/* ---- header ---- */
.kl-header { padding: 40px 64px 20px; border-bottom: 1px solid var(--gray-20); }
.kl-header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.kl-back {
  display: inline-flex; align-items: center; gap: 2px; border: 0; background: none;
  font: 500 13px/18px var(--font-sans); color: var(--gray-60); cursor: pointer;
  padding: 0; margin-bottom: 12px;
}
.kl-back svg { width: 18px; height: 18px; }
.kl-back:hover { color: var(--gray-90); }

/* ---- 병원 연동 배너 ---- */
.kl-hbanner {
  margin-top: 18px; display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  background: #FFFBE6; border: 1px solid #FCE97A;
}
.kl-hbanner .kl-kmark { width: 26px; height: 26px; flex: none; }
.kl-hbanner-txt { display: flex; flex-direction: column; flex: 1; }
.kl-hbanner-txt b { font: 600 14px/20px var(--font-sans); color: var(--gray-100); }
.kl-hbanner-txt .kl-sub { margin-top: 1px; }
.kl-hbanner-tag {
  font: 600 12px/16px var(--font-sans); color: #8A6D00;
  background: #FCE97A; padding: 4px 10px; border-radius: 999px;
}
.kl-kmark { display: inline-flex; }
.kl-kmark svg, .kl-kmark { width: 20px; height: 20px; }
.kl-kmark.sm, .kl-kmark.sm svg { width: 16px; height: 16px; }

/* ---- body ---- */
.kl-body { padding: 24px 64px 120px; }
.kl-note { font: 400 12px/18px var(--font-sans); color: var(--gray-50); margin-top: 14px; }

/* ---- table ---- */
.kl-table { border: 1px solid var(--gray-30); border-radius: 12px; overflow: hidden; }
.kl-tr {
  display: grid; grid-template-columns: 52px 1.6fr 1fr 1.4fr 130px 130px;
  align-items: center; padding: 0 20px; min-height: 60px; gap: 12px;
}
.kl-th {
  min-height: 44px; background: var(--gray-10);
  font: 600 12px/16px var(--font-sans); color: var(--gray-60);
  border-bottom: 1px solid var(--gray-30);
}
.kl-row { border-bottom: 1px solid var(--gray-20); cursor: pointer; transition: background .12s; }
.kl-row:last-child { border-bottom: 0; }
.kl-row:hover { background: var(--alpha-blue-05); }
.kl-row.checked { background: var(--alpha-blue-10); }
.kl-cell-name { font: 600 14px/20px var(--font-sans); color: var(--gray-100); display: flex; align-items: center; gap: 8px; }
.kl-hide-tag { font: 500 11px/14px var(--font-sans); color: var(--gray-60); background: var(--gray-20); padding: 2px 6px; border-radius: 4px; }
.kl-tr .kl-sub { margin-top: 0; }
.kl-none { color: var(--gray-50); }
.kl-none.err { color: var(--red-60); }

.kl-c-check { display: flex; align-items: center; }
.kl-check {
  width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--gray-40);
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff; cursor: pointer; transition: all .12s; background: #fff;
}
.kl-check svg { width: 14px; height: 14px; }
.kl-check.on { background: var(--blue-60); border-color: var(--blue-60); }
.kl-check.disabled { background: var(--gray-15); border-color: var(--gray-30); cursor: not-allowed; }
.kl-c-more { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.kl-arrow-r { width: 12px; height: 12px; color: var(--gray-50); display: inline-flex; }
.kl-issuecount { font: 600 11px/16px var(--font-sans); padding: 3px 8px; border-radius: 999px; }
.kl-issuecount.warn { color: var(--orange-60); background: rgba(247,144,9,.12); }
.kl-issuecount.err { color: var(--red-70); background: var(--alpha-red-10); }

/* ---- 상태 뱃지 ---- */
.kl-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font: 600 12px/16px var(--font-sans); padding: 5px 10px; border-radius: 999px;
}
.kl-badge .kl-dot { width: 6px; height: 6px; border-radius: 50%; }
.kl-badge.linked { color: var(--green-80); background: rgba(31,169,114,.10); }
.kl-badge.linked .kl-dot { background: var(--green-80); }
.kl-badge.ready { color: var(--blue-70); background: var(--alpha-blue-10); }
.kl-badge.ready .kl-dot { background: var(--blue-60); }
.kl-badge.warn { color: var(--orange-60); background: rgba(247,144,9,.12); }
.kl-badge.warn .kl-dot { background: var(--orange-60); }
.kl-badge.err { color: var(--red-70); background: var(--alpha-red-10); }
.kl-badge.err .kl-dot { background: var(--red-60); }

/* ---- 하단 액션바(목록) ---- */
.kl-actionbar {
  position: absolute; left: 0; right: 0; bottom: 0; transform: translateY(100%);
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 64px; background: #fff; border-top: 1px solid var(--gray-30);
  box-shadow: 0 -4px 16px rgba(22,24,29,.06); transition: transform .2s ease; z-index: 5;
}
.kl-actionbar.show { transform: translateY(0); }
.kl-actionbar-txt { font: 600 14px/20px var(--font-sans); color: var(--gray-90); }
.kl-actionbar-btns { display: flex; gap: 8px; }

/* ---- 상세 레이아웃 ---- */
.kl-detail { display: grid; grid-template-columns: 1fr 340px; gap: 28px; padding: 24px 64px 120px; align-items: start; }
.kl-detail-left { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.kl-detail-right { position: sticky; top: 24px; }
.kl-preview-label { font: 600 13px/18px var(--font-sans); color: var(--gray-70); margin-bottom: 10px; }

/* ---- 검증 요약 ---- */
.kl-verify { border-radius: 12px; padding: 16px 18px; border: 1px solid; }
.kl-verify.ok { background: rgba(31,169,114,.06); border-color: rgba(31,169,114,.3); }
.kl-verify.warn { background: rgba(247,144,9,.06); border-color: rgba(247,144,9,.3); }
.kl-verify.err { background: var(--alpha-red-05); border-color: rgba(250,70,85,.3); }
.kl-verify-head { display: flex; align-items: center; gap: 8px; font: 600 15px/22px var(--font-sans); color: var(--gray-100); }
.kl-verify-ic { width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; flex: none; color: #fff; }
.kl-verify-ic svg { width: 14px; height: 14px; }
.kl-verify-ic.ok { background: var(--green-80); }
.kl-verify-ic.err { background: transparent; color: var(--red-60); }
.kl-verify-ic.err svg { width: 20px; height: 20px; }
.kl-verify-counts { display: flex; gap: 14px; margin-top: 12px; }
.kl-vc { display: inline-flex; align-items: center; gap: 5px; font: 600 13px/18px var(--font-sans); }
.kl-vc svg { width: 15px; height: 15px; }
.kl-vc.err { color: var(--red-70); }
.kl-vc.warn { color: var(--orange-60); }
.kl-vc.info { color: var(--gray-60); }

/* ---- 카드 ---- */
.kl-card { border: 1px solid var(--gray-30); border-radius: 12px; padding: 20px; }
.kl-card-title { font: 700 15px/22px var(--font-sans); color: var(--gray-100); margin-bottom: 14px; display: flex; align-items: baseline; gap: 8px; }
.kl-card-sub { font: 500 12px/16px var(--font-sans); color: var(--gray-50); }

/* ---- 매핑 테이블 ---- */
.kl-maptable { display: flex; flex-direction: column; }
.kl-maprow { display: grid; grid-template-columns: 84px 1fr 32px 1fr; align-items: center; gap: 10px; padding: 9px 0; }
.kl-maphead { padding-bottom: 8px; border-bottom: 1px solid var(--gray-20); }
.kl-maphead .kl-map-from, .kl-maphead .kl-map-to { font: 600 12px/16px var(--font-sans); color: var(--gray-60); }
.kl-map-label { font: 600 13px/18px var(--font-sans); color: var(--gray-70); }
.kl-map-from, .kl-map-to { font: 400 13px/19px var(--font-sans); color: var(--gray-90); word-break: break-all; }
.kl-map-from b, .kl-map-to b { font-weight: 600; }
.kl-map-to.warn { color: var(--gray-90); }
.kl-map-to.err { color: var(--red-60); }
.kl-len { display: block; font: 400 11px/15px var(--font-sans); color: var(--gray-50); margin-top: 2px; }
.kl-map-arrow { display: inline-flex; align-items: center; justify-content: center; color: var(--gray-40); }
.kl-map-arrow svg { width: 18px; height: 18px; }
.kl-map-arrow.warn { color: var(--orange-60); }
.kl-map-arrow.err { color: var(--red-60); }
.kl-map-divider { height: 1px; background: var(--gray-20); margin: 6px 0; }

/* ---- 검증 이슈 리스트 ---- */
.kl-issue { display: flex; gap: 12px; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
.kl-issue:last-child { margin-bottom: 0; }
.kl-issue.err { background: var(--alpha-red-05); }
.kl-issue.warn { background: rgba(247,144,9,.06); }
.kl-issue.info { background: var(--gray-10); }
.kl-issue-ic { flex: none; width: 20px; height: 20px; display: inline-flex; }
.kl-issue-ic svg { width: 18px; height: 18px; }
.kl-issue.err .kl-issue-ic { color: var(--red-60); }
.kl-issue.warn .kl-issue-ic { color: var(--orange-60); }
.kl-issue.info .kl-issue-ic { color: var(--gray-50); }
.kl-issue-body { flex: 1; }
.kl-issue-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.kl-issue-lv { font: 700 11px/15px var(--font-sans); padding: 1px 7px; border-radius: 4px; }
.kl-issue-lv.err { color: #fff; background: var(--red-60); }
.kl-issue-lv.warn { color: #fff; background: var(--orange-60); }
.kl-issue-lv.info { color: var(--gray-70); background: var(--gray-30); }
.kl-issue-field { font: 600 13px/18px var(--font-sans); color: var(--gray-90); }
.kl-issue-msg { font: 400 13px/20px var(--font-sans); color: var(--gray-80); }
.kl-issue-fix { font: 500 12px/18px var(--font-sans); color: var(--blue-70); margin-top: 3px; }
.kl-issue-empty { font: 400 13px/20px var(--font-sans); color: var(--green-80); }

/* ---- 카카오 미리보기 (폰) ---- */
.kl-kphone { border: 1px solid var(--gray-30); border-radius: 16px; overflow: hidden; background: #fff; box-shadow: 0 4px 16px rgba(22,24,29,.06); }
.kl-kphone-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: #FEE500; font: 600 13px/18px var(--font-sans); color: #3C1E1E; }
.kl-kphone-body { display: flex; flex-direction: column; }
.kl-kimg { height: 150px; background: linear-gradient(135deg, var(--gray-20), var(--gray-30)); display: flex; align-items: center; justify-content: center; font: 500 12px/16px var(--font-sans); color: var(--gray-60); }
.kl-kimg.empty { background: repeating-linear-gradient(45deg, var(--gray-15), var(--gray-15) 10px, var(--gray-20) 10px, var(--gray-20) 20px); }
.kl-kpad { padding: 16px; }
.kl-kname { font: 700 17px/24px var(--font-sans); color: var(--gray-100); }
.kl-kdesc { font: 400 13px/19px var(--font-sans); color: var(--gray-70); margin-top: 4px; }
.kl-kkeywords { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.kl-kkw { font: 500 11px/16px var(--font-sans); color: var(--gray-60); background: var(--gray-15); padding: 3px 8px; border-radius: 999px; }
.kl-kdivider { height: 1px; background: var(--gray-20); margin: 14px 0; }
.kl-ksec-label { font: 600 12px/16px var(--font-sans); color: var(--gray-60); margin-bottom: 8px; }
.kl-kprice { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; gap: 12px; }
.kl-kprice-name { font: 500 13px/18px var(--font-sans); color: var(--gray-90); }
.kl-kprice-desc { font: 600 13px/18px var(--font-sans); color: var(--gray-100); white-space: nowrap; }
.kl-kslot { font: 500 13px/18px var(--font-sans); color: var(--gray-80); }
.kl-kcta { margin: 16px; padding: 13px; text-align: center; background: #FEE500; color: #3C1E1E; font: 700 15px/20px var(--font-sans); border-radius: 10px; }

/* ---- 하단 footer(상세) ---- */
.kl-footer {
  position: absolute; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 64px; background: #fff; border-top: 1px solid var(--gray-30);
  box-shadow: 0 -4px 16px rgba(22,24,29,.06); z-index: 5;
}
.kl-footer-status { font: 500 13px/20px var(--font-sans); color: var(--gray-70); display: inline-flex; align-items: center; gap: 8px; }
.kl-footer-status.linked { color: var(--green-80); font-weight: 600; }
.kl-footer-status.linked .kl-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-80); }
.kl-footer-btns { display: flex; gap: 8px; }

/* ---- 버튼 ---- */
.kl-btn-kakao, .kl-btn-cancel, .kl-btn-outline, .kl-btn-danger {
  height: 44px; padding: 0 20px; border-radius: 10px; cursor: pointer;
  font: 600 14px/44px var(--font-sans); border: 1px solid transparent;
  display: inline-flex; align-items: center; gap: 6px;
}
.kl-btn-kakao { background: #FEE500; color: #3C1E1E; }
.kl-btn-kakao:hover { background: #F5DC00; }
.kl-btn-kakao:disabled { background: var(--gray-20); color: var(--gray-50); cursor: not-allowed; }
.kl-btn-kakao:disabled .kl-kmark { opacity: .4; }
.kl-btn-cancel { background: var(--gray-15); color: var(--gray-80); }
.kl-btn-cancel:hover { background: var(--gray-20); }
.kl-btn-outline { background: #fff; color: var(--gray-80); border-color: var(--gray-40); }
.kl-btn-outline:hover { background: var(--gray-10); }
.kl-btn-danger { background: #fff; color: var(--red-70); border-color: rgba(250,70,85,.4); }
.kl-btn-danger:hover { background: var(--alpha-red-05); }

/* ---- toast ---- */
.kl-toast {
  position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%);
  background: var(--gray-100); color: #fff; padding: 13px 20px; border-radius: 10px;
  font: 500 14px/20px var(--font-sans); box-shadow: var(--shadow-toast); z-index: 20;
  white-space: nowrap;
}
