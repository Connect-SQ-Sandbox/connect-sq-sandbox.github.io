/* styles/connectShell.css */
/* =============================================================
   굿닥 커넥트 웹뷰 — 공통 셸 (디자인 토큰 + 윈도우 셸/사이드내비)
   여러 커넥트 화면(진료항목 등록, 예약 신청 내역 등)이 공유한다.
   - /Users/goodoc/test 프로토타입의 colors_and_type.css(:root)와
     connect.css의 셸 부분을 이식.
   - 전역 누수 방지를 위해 원본 body 레벨 스타일은 .cn-artboard 래퍼로
     한정했고 리셋도 .cn-artboard 하위로 스코프.
   - 클래스 접두사(cn-)가 고유해 다른 페이지와 충돌하지 않음.
   ============================================================= */

/* ---- Design tokens (colors_and_type.css :root, @font-face 제외) ---- */
:root {
  --gray-10:  #F9FAFB;
  --gray-15:  #F4F6F8;
  --gray-20:  #F2F4F6;
  --gray-30:  #E5E8EB;
  --gray-40:  #D1D6DB;
  --gray-50:  #B0B8C1;
  --gray-60:  #8B95A1;
  --gray-70:  #6B7684;
  --gray-80:  #4E5968;
  --gray-90:  #31353F;
  --gray-100: #191F28;

  --blue-30:  #B3D5FF;
  --blue-60:  #0073FA;
  --blue-70:  #0061DB;
  --blue-80:  #0050B5;

  --red-60:   #FA4655;
  --red-70:   #EC3847;
  --red-80:   #D52130;

  --green-70: #41D293;
  --green-80: #1FA972;
  --orange-60:#F79009;

  --white: #FFFFFF;
  --black: #000000;
  --transparent: transparent;

  --alpha-gray-05: rgba(128, 135, 153, 0.05);
  --alpha-gray-10: rgba(128, 135, 153, 0.10);
  --alpha-gray-15: rgba(128, 135, 153, 0.15);
  --alpha-gray-20: rgba(128, 135, 153, 0.20);
  --alpha-gray-40: rgba(128, 135, 153, 0.40);
  --alpha-gray-60: rgba(128, 135, 153, 0.60);

  --alpha-blue-05: rgba(0, 115, 250, 0.05);
  --alpha-blue-10: rgba(0, 115, 250, 0.10);
  --alpha-blue-15: rgba(0, 115, 250, 0.15);
  --alpha-blue-20: rgba(0, 115, 250, 0.20);

  --alpha-red-05: rgba(250, 70, 85, 0.05);
  --alpha-red-10: rgba(250, 70, 85, 0.10);
  --alpha-red-15: rgba(250, 70, 85, 0.15);
  --alpha-red-20: rgba(250, 70, 85, 0.20);

  --shadow-toast: 0 2px 1px rgba(22, 24, 29, 0.02), 0 2px 8px rgba(22, 24, 29, 0.10);
  --shadow-toggle-knob: 0 0 6px rgba(0, 0, 0, 0.25);

  --font-sans: 'Pretendard', 'Pretendard Variable', -apple-system,
    BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}

/* ---- Artboard backdrop (원본 connect.css의 body 스타일을 래퍼로 한정) ---- */
.cn-artboard {
  font-family: var(--font-sans);
  background: #e7e9ee;
  color: var(--gray-100);
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 24px;
}
.cn-artboard *,
.cn-artboard *::before,
.cn-artboard *::after { box-sizing: border-box; }

/* ---- App window (1280 x 832 rounded webview frame) ---- */
.cn-screen {
  width: 1280px;
  min-height: 832px;
  background: var(--white);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 12px 40px rgba(22, 24, 29, 0.12);
  position: relative;
}

/* ---- Title bar (windows-style) ---- */
.cn-titlebar {
  height: 32px;
  background: #f3f3f3;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex: none;
}
.cn-ci { display: flex; align-items: center; gap: 4px; padding: 0 8px; height: 100%; }
.cn-ci-mark { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
.cn-ci-mark svg { display: block; }
.cn-ci-name { font: 500 13px/16px var(--font-sans); color: rgba(0, 0, 0, 0.9); padding: 0 8px 2px 4px; }
.cn-winctrls { display: flex; height: 100%; }
.cn-winbtn {
  width: 46px; height: 32px;
  border: 0; background: transparent;
  display: inline-flex; align-items: center; justify-content: center;
  color: rgba(0, 0, 0, 0.9); cursor: pointer;
}
.cn-winbtn:hover { background: rgba(0, 0, 0, 0.05); }
.cn-winbtn.close:hover { background: #e81123; color: #fff; }

/* ---- Body: nav + main ---- */
.cn-body { display: flex; align-items: stretch; flex: 1; min-height: 800px; }

/* ---- Side nav (250px) ---- */
.cn-nav { width: 250px; flex: none; background: #f2f4f7; position: relative; display: flex; flex-direction: column; }
.cn-nav-scroll { flex: 1; overflow: auto; }
.cn-nav-group { padding: 8px 0; display: flex; flex-direction: column; }
.cn-nav-header { height: 40px; display: flex; align-items: center; padding: 0 16px; font: 600 14px/20px var(--font-sans); color: rgba(0, 0, 0, 0.9); }
.cn-nav-item {
  height: 40px; width: 100%;
  border: 0; background: transparent;
  display: flex; align-items: center;
  padding: 0 16px; position: relative; cursor: pointer; text-align: left;
}
.cn-nav-item > .cn-nav-label { font: 400 14px/22px var(--font-sans); color: var(--gray-90); flex: 1; }
.cn-nav-item .cn-chevron { width: 12px; height: 12px; color: #808799; flex: none; display: inline-flex; align-items: center; justify-content: center; }
.cn-nav-item.sub { padding-left: 32px; }
.cn-nav-item.sub::before { content: ""; position: absolute; inset: 2px 4px; border-radius: 4px; pointer-events: none; }
.cn-nav-item.active::before { background: var(--alpha-gray-10); }
.cn-nav-item.active .cn-nav-label { color: var(--gray-90); }
.cn-nav-item:not(.active):not(.cn-nav-header):hover::before {
  content: ""; position: absolute; inset: 2px 4px;
  background: rgba(128, 135, 153, 0.06); border-radius: 4px; pointer-events: none;
}
.cn-nav-label-wrap { display: inline-flex; align-items: center; gap: 6px; flex: 1; }
.cn-beta {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0 5px; border-radius: 4px;
  background: var(--alpha-blue-10);
  font: 600 12px/18px var(--font-sans);
  color: var(--blue-80, #115fd4);
}
.cn-nav-divider { padding: 4px 0; }
.cn-nav-divider span { display: block; height: 1px; background: var(--gray-30); }
.cn-nav-footer { background: #f2f4f7; padding-bottom: 8px; display: flex; flex-direction: column; }

/* ---- Main frame ---- */
.cn-main { flex: 1; min-width: 0; background: var(--white); display: flex; flex-direction: column; }
.cn-header { padding: 48px 64px 32px; }
.cn-header-title { font: 700 28px/36px var(--font-sans); color: #16181d; }
.cn-header-desc { font: 400 14px/22px var(--font-sans); color: #808799; margin-top: 6px; }


/* styles/prototypeChanges.css */
/* 프로토타입 메타 UI: 실제 Connect 기능이 아니라 정책 변경 추적용 패널 */
.pc-trigger {
  position: fixed; top: 72px; right: 0; z-index: 105;
  height: 40px; padding: 0 12px 0 10px; border: 1px solid var(--gray-30); border-right: 0;
  border-radius: 8px 0 0 8px; background: var(--gray-100); color: var(--white);
  display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
  font: 600 12px/18px var(--font-sans); box-shadow: 0 4px 16px rgba(22,24,29,.14);
}
.pc-trigger:hover { background: var(--gray-90); }
.pc-trigger-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-70); }
.pc-trigger-count { min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; background: rgba(255,255,255,.16); font: 700 11px/18px var(--font-sans); }

/* 딤 제거: 우측 패널을 비모달로 (열어둔 채 본문 확인·조작 가능) */
.pc-scrim { display: none; }
.pc-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 120; width: 392px;
  background: var(--white); box-shadow: -12px 0 32px rgba(22,24,29,.14);
  display: flex; flex-direction: column; transform: translateX(102%); visibility: hidden;
  transition: transform .2s ease, visibility .2s;
}
.pc-drawer.open { transform: translateX(0); visibility: visible; }
.pc-drawer-head { min-height: 52px; padding: 0 18px; border-bottom: 1px solid var(--gray-20); display: flex; align-items: center; justify-content: space-between; flex: none; }
.pc-eyebrow { font: 700 11px/16px var(--font-sans); letter-spacing: .08em; color: var(--blue-70); }
.pc-close { width: 32px; height: 32px; border-radius: 6px; color: var(--gray-70); font: 400 24px/30px var(--font-sans); cursor: pointer; }
.pc-close:hover, .pc-back:hover { background: var(--gray-10); }
.pc-back { height: 32px; padding: 0 8px; border-radius: 6px; color: var(--gray-80); font: 600 13px/32px var(--font-sans); cursor: pointer; }

.pc-drawer-title-wrap { padding: 22px 20px 16px; flex: none; }
.pc-drawer-title-wrap h2 { margin: 0; font: 700 22px/30px var(--font-sans); color: var(--gray-100); }
.pc-drawer-title-wrap p { margin: 7px 0 0; font: 400 13px/20px var(--font-sans); color: var(--gray-70); }
.pc-planned-filter { margin-top: 16px; padding: 12px 13px; border: 1px solid var(--gray-30); border-radius: 9px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.pc-planned-filter > div { min-width: 0; display: flex; flex-direction: column; }
.pc-planned-filter strong { color: var(--gray-90); font: 600 13px/19px var(--font-sans); }
.pc-planned-filter span { color: var(--gray-60); font: 400 11px/17px var(--font-sans); }
.pc-switch { width: 40px; height: 24px; padding: 2px; border-radius: 999px; background: var(--gray-40); cursor: pointer; transition: background .15s; flex: none; }
.pc-switch > span { display: block; width: 20px; height: 20px; border-radius: 50%; background: var(--white); box-shadow: 0 1px 4px rgba(22,24,29,.18); transition: transform .15s; }
.pc-switch.on { background: #f79009; }
.pc-switch.on > span { transform: translateX(16px); }
.pc-planned-notice { margin-top: 8px; padding: 8px 10px; border-radius: 6px; background: rgba(247,144,9,.09); color: #9a5800; font: 500 11px/17px var(--font-sans); }
.pc-dev-filter { margin-top: 10px; border-color: rgba(234, 179, 8, .48); background: #fffdf2; }
.pc-dev-notice { margin-top: 8px; padding: 8px 10px; border: 1px solid rgba(234, 179, 8, .35); border-radius: 6px; background: #fff8cf; color: #745300; font: 600 11px/17px var(--font-sans); }
.pc-dev-note { margin: 0 0 16px; padding: 13px 15px; border: 1px solid #e9bd32; border-left: 4px solid #e0a600; border-radius: 8px; background: #fff8cf; box-shadow: 0 2px 8px rgba(116,83,0,.06); color: #5f4700; }
.pc-dev-note-head { display: flex; align-items: center; gap: 8px; }
.pc-dev-note-head > span { padding: 2px 6px; border-radius: 4px; background: #e0a600; color: #fff; font: 800 10px/16px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .04em; }
.pc-dev-note-head strong { font: 700 13px/20px var(--font-sans); }
.pc-dev-note ul { margin: 8px 0 0; padding-left: 18px; }
.pc-dev-note li { margin-top: 4px; font: 500 12px/19px var(--font-sans); word-break: keep-all; }
.pc-dev-note code { padding: 1px 4px; border-radius: 4px; background: rgba(116,83,0,.10); color: #604700; font: 600 11px/17px ui-monospace, SFMono-Regular, Menlo, monospace; }
.pc-current-view { display: inline-flex; margin-top: 12px; padding: 5px 9px; border-radius: 6px; background: var(--alpha-blue-10); color: var(--blue-70); font: 600 12px/18px var(--font-sans); }
.pc-scope { margin: 0 20px; padding: 3px; border-radius: 8px; background: var(--gray-20); display: grid; grid-template-columns: 1fr 1fr; flex: none; }
.pc-scope button { height: 34px; border-radius: 6px; color: var(--gray-70); cursor: pointer; font: 600 13px/34px var(--font-sans); }
.pc-scope button span { margin-left: 3px; color: var(--gray-50); }
.pc-scope button.active { background: var(--white); color: var(--gray-100); box-shadow: 0 1px 4px rgba(22,24,29,.08); }

.pc-change-list { padding: 16px 20px 28px; overflow: auto; display: flex; flex-direction: column; gap: 12px; }
.pc-empty { padding: 40px 12px; text-align: center; color: var(--gray-60); font: 400 13px/20px var(--font-sans); }
.pc-change-card { border: 1px solid var(--gray-30); border-radius: 10px; overflow: hidden; background: var(--white); transition: border-color .12s, box-shadow .12s; }
.pc-change-card:hover { border-color: var(--gray-50); box-shadow: 0 4px 16px rgba(22,24,29,.06); }
.pc-change-card.planned { border-color: rgba(247,144,9,.36); background: linear-gradient(180deg, rgba(247,144,9,.035), var(--white) 40%); }
.pc-change-main { width: 100%; padding: 15px 15px 13px; text-align: left; cursor: pointer; }
.pc-change-meta { display: flex; align-items: center; gap: 6px; }
.pc-change-meta time { margin-left: auto; color: var(--gray-60); font: 500 11px/16px var(--font-sans); }
.pc-prd-id { display: inline-flex; padding: 3px 7px; border-radius: 5px; background: var(--alpha-blue-10); color: var(--blue-70); font: 700 11px/16px var(--font-sans); }
.pc-publish, .pc-source-status { display: inline-flex; padding: 3px 7px; border-radius: 5px; font: 600 11px/16px var(--font-sans); }
.pc-publish.baseline, .pc-source-status.review { background: rgba(247,144,9,.10); color: #b25f00; }
.pc-publish.approved, .pc-source-status.approved { background: rgba(31,169,114,.10); color: var(--green-80); }
.pc-publish.planned, .pc-source-status.draft { background: rgba(247,144,9,.12); color: #9a5800; }
.pc-change-main h3 { margin: 11px 0 12px; font: 700 15px/22px var(--font-sans); color: var(--gray-100); }
.pc-diff { display: grid; grid-template-columns: 35px 1fr; gap: 8px; align-items: start; margin-top: 7px; }
.pc-diff > span { height: 20px; border-radius: 4px; text-align: center; font: 600 11px/20px var(--font-sans); }
.pc-diff p { margin: 0; color: var(--gray-70); font: 400 12px/19px var(--font-sans); }
.pc-diff.before > span { background: var(--gray-20); color: var(--gray-60); }
.pc-diff.after > span { background: var(--alpha-blue-10); color: var(--blue-70); }
.pc-locate-hint { margin-top: 12px; color: var(--blue-70); font: 600 12px/18px var(--font-sans); }
.pc-change-foot { min-height: 40px; padding: 0 12px 0 15px; border-top: 1px solid var(--gray-20); background: var(--gray-10); display: flex; align-items: center; justify-content: space-between; }
.pc-change-foot > span { color: var(--gray-60); font: 500 11px/16px var(--font-sans); }
.pc-change-foot button { height: 28px; padding: 0 8px; border-radius: 5px; color: var(--blue-70); font: 600 12px/28px var(--font-sans); cursor: pointer; }
.pc-change-foot button:hover { background: var(--alpha-blue-10); }
.pc-change-foot button:disabled { color: var(--gray-40); cursor: not-allowed; }

.pc-document-overlay { position: fixed; inset: 0; z-index: 220; padding: 40px; background: rgba(22,24,29,.54); display: flex; align-items: center; justify-content: center; }
.pc-document-modal { width: min(920px, calc(100vw - 48px)); height: min(820px, calc(100vh - 48px)); border-radius: 14px; background: var(--white); box-shadow: 0 24px 80px rgba(22,24,29,.30); overflow: hidden; display: flex; flex-direction: column; }
.pc-document-head { min-height: 104px; padding: 20px 24px; border-bottom: 1px solid var(--gray-20); display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex: none; }
.pc-document-head h2 { margin: 8px 0 0; color: var(--gray-100); font: 700 21px/29px var(--font-sans); }
.pc-document-head p { margin: 3px 0 0; color: var(--gray-60); font: 500 12px/18px var(--font-sans); }
.pc-document-close { flex: none; width: 36px; height: 36px; border-radius: 8px; color: var(--gray-70); font: 400 26px/34px var(--font-sans); cursor: pointer; }
.pc-document-close:hover { background: var(--gray-10); color: var(--gray-100); }
.pc-document-body { padding: 24px 32px 40px; overflow: auto; }
.pc-document-body .pc-summary-source { margin-top: 0; }
.pc-document-body .pc-markdown { max-width: 760px; margin: 24px auto 0; }
.pc-document-body .pc-markdown h1 { font-size: 25px; line-height: 34px; }
.pc-document-body .pc-markdown h2 { margin-top: 28px; font-size: 18px; line-height: 27px; }
.pc-document-body .pc-markdown p, .pc-document-body .pc-md-li { font-size: 14px; line-height: 23px; }

.pc-summary-view { padding: 20px 20px 32px; overflow: auto; }
.pc-summary-meta { display: flex; align-items: center; gap: 7px; }
.pc-summary-release { margin-top: 10px; color: #9a5800; font: 600 12px/18px var(--font-sans); }
.pc-summary-source { margin-top: 10px; padding: 10px 12px; border-radius: 7px; background: var(--gray-10); color: var(--gray-60); font: 500 11px/17px var(--font-sans); word-break: break-all; }
.pc-markdown { margin-top: 18px; }
.pc-markdown h1 { margin: 0 0 16px; color: var(--gray-100); font: 700 21px/29px var(--font-sans); }
.pc-markdown h2 { margin: 22px 0 9px; color: var(--gray-100); font: 700 16px/24px var(--font-sans); }
.pc-markdown h3 { margin: 18px 0 8px; color: var(--gray-90); font: 700 14px/22px var(--font-sans); }
.pc-markdown p { margin: 0; color: var(--gray-70); font: 400 13px/21px var(--font-sans); }
.pc-markdown blockquote { margin: 0 0 16px; padding: 12px 14px; border-left: 3px solid var(--blue-60); background: var(--alpha-blue-05); color: var(--gray-80); font: 500 12px/20px var(--font-sans); }
.pc-markdown code { padding: 2px 5px; border-radius: 4px; background: var(--gray-20); color: var(--gray-80); font: 500 11px/16px ui-monospace, SFMono-Regular, Menlo, monospace; }
.pc-md-li { display: grid; grid-template-columns: 10px 1fr; gap: 5px; align-items: start; margin-top: 5px; }
.pc-md-li > span { color: var(--blue-60); font: 700 13px/21px var(--font-sans); }
.pc-md-gap { height: 6px; }

.pc-policy-highlight { animation: pc-policy-pulse 2.4s ease; outline: 3px solid var(--blue-60); outline-offset: 4px; border-radius: 8px; }
.pc-planned-preview-banner { position: absolute; top: 12px; left: 50%; z-index: 40; transform: translateX(-50%); max-width: calc(100% - 40px); min-height: 36px; padding: 8px 13px; border: 1px solid rgba(247,144,9,.34); border-radius: 8px; background: rgba(255,249,235,.96); box-shadow: 0 4px 14px rgba(93,54,0,.08); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.pc-planned-preview-banner strong { color: #8a4d00; font: 700 12px/18px var(--font-sans); }
.pc-planned-preview-banner span { overflow: hidden; text-overflow: ellipsis; color: #9a650e; font: 500 11px/18px var(--font-sans); }
.pc-planned-row-badge { display: inline-flex; margin-left: 6px; padding: 1px 5px; border-radius: 4px; background: rgba(247,144,9,.12); color: #9a5800; vertical-align: 1px; font: 700 10px/15px var(--font-sans); }
@keyframes pc-policy-pulse {
  0%, 100% { outline-color: transparent; box-shadow: none; }
  15%, 70% { outline-color: var(--blue-60); box-shadow: 0 0 0 8px var(--alpha-blue-10); }
}

@media (max-width: 1100px) {
  .pc-drawer { width: min(392px, calc(100% - 24px)); }
  .pc-scrim { left: 0; }
  .pc-document-overlay { padding: 20px; }
  .pc-document-modal { width: calc(100vw - 40px); height: calc(100vh - 40px); }
  .pc-document-body { padding: 20px 22px 32px; }
}


/* styles/connectRegister.css */
/* =============================================================
   굿닥 커넥트 웹뷰 — 진료항목 정보(등록) 화면 전용 전역 스타일
   /Users/goodoc/test 프로토타입(register.css)을 Next.js 프로젝트로 이식.
   - className은 프로토타입과 동일하게 유지(plain CSS).
   - 토큰/리셋/공통 셸(.cn-artboard, .cn-screen, 타이틀바, 사이드 내비)은
     connectShell.css에서 공유한다. 이 파일은 rg-* 화면 전용 스타일만 담는다.
   - 클래스 접두사(rg-)가 고유해 다른 페이지와 충돌하지 않음.
   ============================================================= */

/* ---- Main: 풋터 absolute 기준 ---- */
.rg-main { position: relative; }

/* 헤더 eyebrow */
.rg-eyebrow { font: 400 14px/22px var(--font-sans); color: #808799; margin-bottom: 6px; }

/* ---- 본문 2단 레이아웃 ---- */
.rg-container {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  padding: 0 64px 124px;
}
.rg-form { flex: 1 0 0; min-width: 0; display: flex; flex-direction: column; gap: 24px; }

/* ---- 흰색 섹션 카드 ---- */
.rg-card {
  background: var(--white);
  border: 1px solid rgba(128, 135, 153, 0.2);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.rg-card.required { padding: 20px 0; }
.rg-card.extra { padding: 24px 0; }

/* 그룹 타이틀 */
.rg-group-title { font: 700 18px/26px var(--font-sans); color: #16181d; padding: 0 24px; }

/* ---- 필드 공통 ---- */
.rg-field { padding: 0 24px; display: flex; flex-direction: column; }
.rg-field-head { display: flex; flex-direction: column; gap: 2px; padding-bottom: 8px; }
.rg-label { font: 600 16px/26px var(--font-sans); color: #31353f; }
.rg-label.optional { color: #434956; }
.rg-optional { font-weight: 600; color: #808799; }
.rg-help { font: 400 12px/18px var(--font-sans); color: #5d6474; }

/* ---- 입력 (디자인 시스템 Input: border #caced8 / radius 6 / 40h / Medium 14) ---- */
.rg-input {
  width: 100%;
  height: 40px;
  border: 1px solid #caced8;
  border-radius: 6px;
  padding: 0 16px;
  background: var(--white);
  font: 500 14px/22px var(--font-sans);
  color: #16181d;
}
.rg-input::placeholder { color: #a8aebd; font-weight: 500; }
.rg-input:focus { outline: none; border-color: var(--blue-60, #0073fa); }
/* 유효성 실패 필드 — 빨간 테두리 + 하단 빨간 메시지 (실제 서비스 컨벤션) */
.rg-input.error, .rg-num.error { border-color: var(--red-60, #f5535f); }
.rg-input.error:focus, .rg-num.error:focus { border-color: var(--red-60, #f5535f); }
.rg-error { margin: 6px 0 0; font: 500 13px/18px var(--font-sans); color: var(--red-60, #f5535f); }

.rg-search { position: relative; }
.rg-search .rg-input { padding-right: 44px; }
.rg-search-ic {
  position: absolute; top: 50%; right: 16px; transform: translateY(-50%);
  width: 18px; height: 18px; color: #808799; pointer-events: none;
}

/* 글자 수 카운터 */
.rg-counter { margin-top: 8px; text-align: right; font: 500 13px/18px var(--font-sans); color: #808799; }
.rg-counter-num { font-weight: 600; color: #434956; }

/* ---- 가격 정보 필드: 공통 24px 거터 구조 ----
   필드 좌측 패딩(24px)을 제거하고 드래그 핸들(24px)이 그 거터를 대신한다.
   → 가격명 인풋의 좌측 엣지가 진료항목 인풋과 정확히 정렬되며,
     레이블/도움말만 24px 들여써서 콘텐츠-좌측 정렬을 유지. */
.rg-field.price { padding-left: 0; padding-right: 24px; }
.rg-field.price .rg-field-head { padding-left: 24px; }
.rg-price-list { display: flex; flex-direction: column; }

/* ---- 가격 옵션 행 (상태: 기본 / Hover / DND) ---- */
.rg-price-row {
  display: flex; align-items: flex-start;
  /* 좌측: 핸들(24px)이 거터 역할 / 우측: × 버튼 우측 엣지가 진료항목 인풋 우측과 정렬되도록 패딩 0 */
  padding: 8px 0;
  border-radius: 8px;
}
/* DND(드래그 중): 흰 배경 + 회색 테두리(ring) + 그림자 — 레이아웃 영향 없도록 box-shadow 사용 */
.rg-price-row.dragging {
  background: var(--white);
  box-shadow: 0 0 0 1px #a8aebd, 0 2px 0.5px rgba(22, 24, 29, 0.02), 0 2px 4px rgba(22, 24, 29, 0.1);
}
/* 드래그 핸들: 기본 숨김 → Hover/DND 시 노출 */
.rg-drag {
  width: 24px; flex: none;
  align-self: stretch; min-height: 40px;
  padding: 0 8px;
  display: flex; align-items: center; justify-content: center;
  color: #808799; opacity: 0; cursor: grab;
}
.rg-price-row:hover .rg-drag,
.rg-price-row.dragging .rg-drag { opacity: 1; }
.rg-price-row.dragging .rg-drag { cursor: grabbing; }
.rg-drag svg { width: 8px; height: 12px; }
.rg-price-fields { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.rg-price-entry { display: flex; align-items: center; gap: 8px; }

/* 가격 타입 드롭다운 (button + 메뉴) */
.rg-select-wrap { position: relative; flex: none; }
.rg-select.open { border-color: var(--blue-60, #0073fa); }
.rg-select-menu {
  position: absolute; top: calc(100% + 4px); left: 0; z-index: 20;
  width: 140px; padding: 4px;
  background: var(--white); border: 1px solid #e3e6ed; border-radius: 8px;
  box-shadow: 0 2px 1px rgba(22, 24, 29, 0.02), 0 2px 8px rgba(22, 24, 29, 0.1);
  display: flex; flex-direction: column;
}
.rg-select-opt {
  height: 36px; border: 0; border-radius: 6px; background: transparent;
  padding: 0 12px; text-align: left; cursor: pointer;
  font: 500 14px/22px var(--font-sans); color: #31353f;
}
.rg-select-opt:hover { background: #f2f4f7; }
.rg-select-opt.active { background: var(--alpha-blue-10); color: var(--blue-60, #0073fa); font-weight: 600; }

/* 할인 가격: 정상가 → 판매가 화살표 */
.rg-price-arrow { flex: none; font: 500 14px/22px var(--font-sans); color: #808799; }

.rg-select {
  width: 140px; flex: none; height: 40px;
  border: 1px solid #caced8; border-radius: 6px;
  padding: 0 12px 0 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  font: 500 14px/22px var(--font-sans); color: #31353f;
  background: var(--white); cursor: pointer;
}
.rg-select .rg-select-ic { width: 16px; height: 16px; color: #5d6474; flex: none; }
.rg-num {
  width: 128px; flex: none; height: 40px;
  border: 1px solid #caced8; border-radius: 6px;
  padding: 0 16px; text-align: right;
  font: 500 14px/22px var(--font-sans); color: #16181d;
  background: var(--white);
}
.rg-num::placeholder { color: #a8aebd; font-weight: 500; }
.rg-num:focus, .rg-select:focus { outline: none; border-color: var(--blue-60, #0073fa); }
.rg-unit {
  height: 40px; flex: none;
  display: flex; align-items: center;
  font: 500 14px/22px var(--font-sans); color: #16181d;
}
.rg-price-del {
  width: 40px; height: 40px; flex: none;
  border: 0; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #16181d; border-radius: 4px;
}
.rg-price-del:hover { background: #f2f4f7; }
.rg-price-del svg { width: 16px; height: 16px; }

/* 가격 옵션 추가 버튼 */
.rg-add-wrap { padding: 16px 24px 0; }
.rg-add-btn {
  width: 100%; height: 40px;
  border: 0; border-radius: 6px;
  background: rgba(0, 115, 250, 0.1);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font: 600 14px/22px var(--font-sans); color: var(--blue-60, #0073fa);
  cursor: pointer;
}
.rg-add-btn svg { width: 18px; height: 18px; }

/* ---- 사진 업로드 ---- */
.rg-upload {
  width: 96px; height: 96px;
  border: 1px dashed #caced8; border-radius: 6px;
  background: var(--white);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  cursor: pointer;
}
.rg-upload svg { width: 24px; height: 24px; color: #808799; }
.rg-upload-label { font: 500 13px/18px var(--font-sans); color: #808799; }

/* 회색 가이드 박스 */
.rg-guide-wrap { padding: 16px 24px 0; }
.rg-guide { background: #f6f7f9; border-radius: 6px; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
.rg-guide-li { display: flex; gap: 6px; font: 400 13px/20px var(--font-sans); color: #5d6474; }
.rg-guide-li::before { content: "\2022"; color: #808799; flex: none; }

/* 텍스트영역 */
.rg-textarea {
  width: 100%; height: 296px;
  border: 1px solid #caced8; border-radius: 6px;
  padding: 9px 16px; resize: none;
  font: 500 14px/22px var(--font-sans); color: #16181d;
  background: var(--white);
}
.rg-textarea::placeholder { color: #a8aebd; font-weight: 500; }
.rg-textarea:focus { outline: none; border-color: var(--blue-60, #0073fa); }

/* 상세 소개 사진 (다중 썸네일, 최대 5개) */
.rg-detail-imgs { display: flex; flex-wrap: wrap; gap: 8px; }
.rg-detail-thumb { position: relative; width: 96px; height: 96px; border-radius: 6px; background: linear-gradient(135deg, #dbeafe, #cfe0ff); }
.rg-detail-thumb-idx { position: absolute; left: 6px; bottom: 6px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 5px; background: rgba(25,31,40,.55); color: #fff; font: 600 11px/18px var(--font-sans); text-align: center; }
.rg-detail-thumb-del { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border: 0; border-radius: 50%; background: rgba(25,31,40,.6); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.rg-detail-thumb-del svg { width: 12px; height: 12px; }
.rg-detail-add { width: 96px; height: 96px; border: 1px dashed #caced8; border-radius: 6px; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
.rg-detail-add svg { width: 24px; height: 24px; color: #808799; }
.rg-detail-add span { font: 500 13px/18px var(--font-sans); color: #808799; }

/* 키워드 태그 입력 */
.rg-tag-box {
  min-height: 80px; margin-top: 8px;
  background: var(--white); border: 1px solid #caced8; border-radius: 8px;
  padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start;
}
.rg-tag-empty { font: 400 14px/22px var(--font-sans); color: #a8aebd; }

/* 구분선 */
.rg-divider { height: 1px; background: #f2f4f7; margin: 0 24px; }

/* =========================================================
   우측 미리보기 (모바일 프레임)
   ========================================================= */
.rg-preview {
  width: 320px; flex: none; height: 740px;
  border: 4px solid #5d6474; border-radius: 24px;
  background: var(--white);
  padding: 4px 4px 24px;
  overflow: hidden;
}
.rg-pv-hero { height: 8px; border-radius: 6px; background: #f2f4f7; }
.rg-pv-basic { padding: 16px; }
.rg-pv-title { font: 700 18px/26px var(--font-sans); color: #a8aebd; }
.rg-pv-divider { height: 5px; background: #f2f4f7; }
.rg-pv-price { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.rg-pv-price-head { font: 700 16px/24px var(--font-sans); color: #31353f; }
.rg-pv-price-row { min-height: 48px; display: flex; align-items: center; justify-content: space-between; }
.rg-pv-price-name { font: 500 14px/22px var(--font-sans); color: #a8aebd; }
.rg-pv-price-val { font: 700 14px/22px var(--font-sans); color: #a8aebd; }

/* =========================================================
   하단 고정 풋터
   ========================================================= */
/* 하단 액션 바 — 뷰포트 최하단 스티키 고정. 전체너비 레이아웃(overflow:visible)이라 sticky가 window 기준으로 동작. */
.rg-footer {
  position: sticky; bottom: 0; z-index: 40;
  height: 64px;
  background: var(--white);
  border-top: 1px solid #e3e6ed;
  padding: 0 64px;
  display: flex; align-items: center; gap: 8px;
}
.rg-footer-left { flex: 1; display: flex; align-items: center; gap: 8px; }
.rg-btn-cancel {
  width: 80px; height: 40px;
  border: 1px solid rgba(128, 135, 153, 0.2); border-radius: 6px;
  background: var(--white); font: 700 14px/22px var(--font-sans); color: #5d6474; cursor: pointer;
}
.rg-btn-save {
  width: 80px; height: 40px;
  border: 0; border-radius: 6px;
  background: var(--blue-60, #0073fa); font: 700 14px/22px var(--font-sans); color: var(--white); cursor: pointer;
}
.rg-footer-right { display: flex; align-items: center; gap: 10px; }
.rg-footer-label { font: 400 14px/22px var(--font-sans); color: #5d6474; }
.rg-toggle { width: 36px; height: 20px; border-radius: 24px; background: var(--blue-60, #0073fa); position: relative; flex: none; cursor: pointer; transition: background 0.15s; }
.rg-toggle.off { background: #caced8; }
.rg-toggle-knob { position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--white); transition: left 0.15s, right 0.15s; }
.rg-toggle.off .rg-toggle-knob { right: auto; left: 2px; }

/* 키워드 칩 */
.rg-tag {
  display: inline-flex; align-items: center; gap: 4px;
  height: 28px; padding: 0 6px 0 10px; border-radius: 6px;
  background: var(--alpha-blue-10); color: var(--blue-70, #0061db);
  font: 500 13px/20px var(--font-sans);
}
.rg-tag-del {
  border: 0; background: transparent; cursor: pointer;
  width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center;
  color: var(--blue-70, #0061db); font-size: 14px; line-height: 1;
}

/* 저장/취소 토스트 */
.rg-toast {
  position: absolute; left: 50%; bottom: 84px; transform: translateX(-50%);
  z-index: 50; padding: 12px 20px; border-radius: 8px;
  background: rgba(25, 31, 40, 0.92); color: var(--white);
  font: 500 14px/22px var(--font-sans);
  box-shadow: var(--shadow-toast);
}


/* styles/connectTiKakao.css */
/* =============================================================
   진료항목 정보 기반 카카오 노출 (ti-kakao) — 신규 버전 전용 CSS
   폼/미리보기 기본 룩은 connectRegister.css(rg-*) 재사용.
   여기서는 목록·카카오 노출 섹션·라이브 미리보기 확장·검증만 담는다. (tk-*)
   ============================================================= */

.tk-main { position: relative; }

/* ============================ 프레임 제거: 실제 앱처럼 브라우저 전체 사용 ============================
   connectShell의 모의 OS 창(회색 배경 + 가운데 정렬된 1280×832 둥근 카드 + 타이틀바)을 걷어내고
   사이드바+본문이 뷰포트 전체를 채우게 한다. (connectTiKakao가 connectShell보다 나중 로드 → 오버라이드) */
.cn-artboard { display: block; padding: 0; background: var(--white); min-height: 100vh; }
.cn-screen { width: 100%; min-height: 100vh; border-radius: 0; box-shadow: none; overflow: visible; }
.cn-titlebar { display: none; }
.cn-body { flex: 1; min-height: 0; }
/* 좌측 LNB를 세로 스크롤과 무관히 고정 (뷰포트 상단 스티키, 전체 높이) */
.cn-nav { position: sticky; top: 0; align-self: flex-start; height: 100vh; }

/* 콘텐츠 최대 너비 1024 (실제 PageTemplate innerContainer max-width) — 좌우 64px 패딩 포함 1152, 본문 좌측 정렬.
   .cn-main(flex column)의 컨텐츠 블록을 캡해 넓은 화면에서 무한정 늘어나지 않게 한다. */
.cn-main .cn-header,
.cn-main .tk-list-body,
.cn-main .rg-container,
.cn-main .ap-body,
.cn-main .set-body { max-width: 1152px; }

/* ---- 공통 버튼 ---- */
.tk-btn-primary {
  height: 40px; padding: 0 16px; border: 0; border-radius: 6px;
  background: var(--blue-60); color: #fff; cursor: pointer;
  font: 700 14px/40px var(--font-sans); display: inline-flex; align-items: center; gap: 6px;
}
.tk-btn-primary svg { width: 16px; height: 16px; }
.tk-btn-primary:hover { background: var(--blue-70); }

.tk-back {
  display: inline-flex; align-items: center; gap: 2px; border: 0; background: none;
  font: 500 13px/18px var(--font-sans); color: #808799; cursor: pointer; padding: 0; margin-bottom: 10px;
}
.tk-back svg { width: 18px; height: 18px; }
.tk-back:hover { color: #31353f; }

/* ============================ 목록 (실제 TreatmentItemsView 재현) ============================ */
.tk-list-header { display: flex; align-items: flex-end; justify-content: space-between; }
.tk-list-sub { font: 400 14px/22px var(--font-sans); color: var(--gray-60); margin-top: 6px; }
.tk-form-header { padding-top: 28px; }
.tk-list-body { padding: 0 64px 64px; }

/* 2단 그리드 */
.tk-grid {
  display: grid;
  grid-template:
    'chead ihead' 56px
    'clist ilist' 1fr
    / 200px minmax(0, 1fr);
  min-height: 420px;
  background: var(--white);
  border: 1px solid var(--gray-30);
  border-radius: 8px;
}
.tk-grid-chead { grid-area: chead; padding: 16px 24px; border-right: 1px solid var(--gray-30); border-bottom: 1px solid var(--gray-30); display: flex; align-items: center; }
.tk-grid-ihead { grid-area: ihead; padding: 16px 24px; border-bottom: 1px solid var(--gray-30); display: flex; align-items: center; }
.tk-grid-title { font: 700 16px/24px var(--font-sans); color: var(--gray-100); }
.tk-grid-clist { grid-area: clist; border-right: 1px solid var(--gray-30); padding-bottom: 48px; }
.tk-grid-ilist { grid-area: ilist; padding: 8px 0; }

/* 좌측 카테고리 항목 */
.tk-cat {
  position: relative; display: flex; align-items: center;
  width: 100%; height: 48px; padding: 0 16px 0 0;
  text-align: left; cursor: pointer; background: var(--white); border: 0;
}
.tk-cat::after { content: ''; position: absolute; top: 0; bottom: 0; left: -1px; width: 2px; background: transparent; pointer-events: none; }
.tk-cat:hover { background: var(--gray-15); }
.tk-cat:hover .tk-cat-handle { opacity: 1; }
.tk-cat.sel { background: var(--alpha-blue-05); }
.tk-cat.sel::after { background: var(--blue-60); }
.tk-cat-handle { display: inline-flex; flex: none; align-items: center; justify-content: center; width: 24px; height: 100%; color: var(--gray-60); opacity: 0; cursor: grab; transition: opacity .12s; }
.tk-cat-handle svg { width: 6px; height: 10px; }
.tk-cat-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font: 500 16px/24px var(--font-sans); color: var(--gray-90); }
.tk-cat.sel .tk-cat-name { font-weight: 600; color: var(--blue-70); }
.tk-cat-count { flex: none; font: 500 12px/16px var(--font-sans); color: var(--gray-60); }
.tk-cat.sel .tk-cat-count { font-weight: 700; color: var(--blue-60); }

/* master2 그룹 (Level2) */
.tk-l2 { display: flex; flex-direction: column; width: 100%; }
.tk-l2-head { display: flex; align-items: center; height: 32px; }
.tk-l2-head .tk-cat-handle { pointer-events: none; }
.tk-l2-head:hover .tk-cat-handle { opacity: 1; } /* 2뎁스 그룹 핸들 hover 노출 */
.tk-l2-name { font: 500 14px/22px var(--font-sans); color: var(--gray-70); }
.tk-l2-body { display: flex; flex-direction: column; }
.tk-l2-pad { height: 16px; }

/* 항목 행 (Level3) */
.tk-l3 { display: flex; align-items: center; width: 100%; height: 48px; border: 1px solid transparent; }
.tk-l3:hover { background: var(--gray-10); }
.tk-l3:hover .tk-l3-handle, .tk-l3:hover .tk-l3-del { opacity: 1; pointer-events: auto; } /* 3뎁스 항목 핸들 hover 노출 */
.tk-l3-handle { display: inline-flex; flex: none; align-items: center; justify-content: center; width: 24px; height: 100%; color: var(--gray-60); opacity: 0; cursor: grab; transition: opacity .12s; }
.tk-l3-handle svg { width: 6px; height: 10px; }
.tk-l3-detail { display: flex; flex: 1; align-items: center; min-width: 0; height: 100%; text-align: left; cursor: pointer; background: none; border: 0; }
.tk-l3-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font: 600 16px/24px var(--font-sans); color: var(--gray-90); }
.tk-l3-price { display: inline-flex; flex: none; align-items: center; gap: 8px; padding-left: 2px; }
.tk-l3-price-text { font: 500 14px/22px var(--font-sans); color: var(--gray-90); }
.tk-l3-optcount { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 6px; background: var(--gray-20); color: var(--gray-70); font: 600 12px/20px var(--font-sans); }
.tk-l3-thumb { position: relative; display: inline-flex; flex: none; align-items: center; justify-content: center; width: 36px; height: 36px; margin: 0 16px; border-radius: 6px; overflow: hidden; }
.tk-l3-thumb svg { width: 36px; height: 36px; }
.tk-l3-thumb-img { width: 36px; height: 36px; border-radius: 6px; background: linear-gradient(135deg, #dbeafe, #cfe0ff); }
.tk-l3-visible { flex: none; font: 600 14px/22px var(--font-sans); color: var(--gray-60); padding-right: 8px; }
.tk-l3-visible.on { color: var(--blue-70); }
.tk-l3 .rg-toggle { flex: none; margin-right: 4px; cursor: pointer; }
.tk-l3-del { display: inline-flex; flex: none; align-items: center; justify-content: center; width: 36px; color: var(--gray-60); opacity: 0; pointer-events: none; transition: opacity .12s; }
.tk-l3-del svg { width: 16px; height: 16px; }

/* 인입 채널 표기 — 굿닥/카카오 사각 뱃지 심볼 (Figma 진료항목_소분류_카카오추가 기준) */
.tk-chans { display: inline-flex; flex: none; align-items: center; gap: 4px; margin-right: 12px; }
.tk-chan { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 4px; overflow: hidden; }
.tk-chan svg { display: block; }
.tk-chan-gd { background: #0073fa; } /* 굿닥: 파란 사각 + 흰 글리프 */
.tk-chan-gd svg { height: 12px; width: auto; }
.tk-chan-kko svg { width: 18px; height: 18px; } /* 카카오: 노란 사각(심볼 자체가 배경) */
.tk-chan.dim { filter: grayscale(1); opacity: 0.3; } /* 미노출: 흐린 회색 */

/* ============================ 폼: 카카오 노출 섹션 ============================ */
.tk-kcard { padding: 0; overflow: hidden; }
.tk-khead { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 20px 24px; }
.tk-khead-left { display: flex; align-items: flex-start; gap: 12px; flex: 1; min-width: 0; }
.tk-khead-text { flex: 1; min-width: 0; } /* 좁아져도 텍스트가 정상 줄바꿈되도록 (0폭 붕괴 방지) */
.tk-khead-mark { width: 28px; height: 28px; flex: none; margin-top: 1px; }
.tk-khead-title { font: 700 18px/26px var(--font-sans); color: #16181d; word-break: keep-all; }
.tk-kdependency { margin: 0 24px 20px; display: flex; gap: 8px; align-items: flex-start; background: rgba(247,144,9,.08); border: 1px solid rgba(247,144,9,.28); border-radius: 8px; padding: 11px 13px; font: 500 13px/20px var(--font-sans); color: var(--orange-60); }
.tk-kdependency svg { width: 16px; height: 16px; flex: none; margin-top: 2px; }
.rg-toggle.disabled { opacity: .4; cursor: not-allowed; }

.tk-kbody { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 16px; border-top: 1px solid #f2f4f7; padding-top: 20px; }
.tk-kauto {
  display: flex; gap: 8px; align-items: flex-start;
  background: var(--alpha-blue-05); border-radius: 8px; padding: 12px 14px;
  font: 400 13px/20px var(--font-sans); color: #434956;
}
.tk-kauto b { color: var(--blue-70); font-weight: 600; }
.tk-kauto-ic { flex: none; display: inline-flex; margin-top: 2px; }
.tk-kauto-ic svg { width: 16px; height: 16px; color: var(--blue-60); }
.tk-kauto-txt { flex: 1; min-width: 0; } /* 텍스트+<b>를 한 문장으로 흐르게 (flex 아이템 분리로 쪼개지던 것 방지) */

/* 노출 캐스케이드 안내 (굿닥 노출 OFF → 카카오도 노출 안 됨) */
.tk-kcascade { display: flex; gap: 8px; align-items: flex-start; background: rgba(247,144,9,.08); border: 1px solid rgba(247,144,9,.28); border-radius: 8px; padding: 11px 13px; font: 500 13px/20px var(--font-sans); color: var(--orange-60); }
.tk-kcascade svg { width: 16px; height: 16px; flex: none; margin-top: 2px; }

.tk-price-row .rg-price-fields { gap: 6px; }
/* 드래그 핸들: 실제 서비스(IconHandler) 크기 6×10로 (register 기본 8×12 override) */
.tk-price-row .rg-drag svg { width: 6px; height: 10px; }

/* 카카오 전용 정보 */
.tk-kextra { display: flex; flex-direction: column; gap: 16px; padding: 4px 2px 0; }
.tk-kextra-desc { margin-bottom: -4px; }
.tk-kfield { display: flex; flex-direction: column; gap: 8px; }
.tk-kfield .rg-counter { margin-top: 0; }
.tk-klabel { font: 600 14px/22px var(--font-sans); color: #434956; }
.tk-klabel-count { font: 500 13px/22px var(--font-sans); color: var(--gray-50); margin-left: 4px; }
.tk-q-row { display: flex; align-items: center; gap: 8px; }
.tk-q-row .rg-input { flex: 1; }
.tk-q-opt { flex: none; width: 64px; height: 40px; padding: 0; border: 1px solid rgba(128,135,153,.2); border-radius: 6px; background: #fff; cursor: pointer; font: 600 14px/38px var(--font-sans); color: #5d6474; text-align: center; }
.tk-q-opt.req { border-color: var(--blue-60); color: var(--blue-60); background: var(--alpha-blue-05); }
.tk-add-sm { align-self: flex-start; height: 36px; padding: 0 12px; border: 0; border-radius: 6px; background: var(--alpha-blue-10); color: var(--blue-60); font: 600 13px/36px var(--font-sans); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
.tk-add-sm svg { width: 15px; height: 15px; }
.tk-add-sm:disabled { background: var(--gray-10); color: var(--gray-40); cursor: not-allowed; }
.tk-add-count { font-weight: 500; opacity: .8; }

/* 부가정보(질문) 3종: 주관식 / 단수 선택형 / 복수 선택형 */
.tk-q-item { display: flex; flex-direction: column; gap: 10px; padding: 13px; border: 1px solid var(--gray-30); border-radius: 8px; background: #fff; transition: border-color .12s; }
.tk-q-item:hover { border-color: var(--gray-50); }
.tk-q-item.dragging { opacity: .5; border-color: var(--blue-60); }
/* 상단 중앙 드래그 핸들 (네이버 폼 참고) */
.tk-q-drag { align-self: center; height: 12px; display: inline-flex; align-items: center; justify-content: center; color: var(--gray-40); cursor: grab; }
.tk-q-drag svg { width: 6px; height: 10px; transform: rotate(90deg); }
.tk-q-item.dragging .tk-q-drag { cursor: grabbing; }
/* 유형 드롭다운(객관식/주관식) */
.tk-q-typesel { align-self: flex-start; }
.tk-q-typebtn { width: 200px; }
.tk-q-typesel .rg-select-menu { min-width: 200px; }
/* 질문 입력 행 (답변 필수 시 * 표시) */
.tk-q-qrow { display: flex; align-items: center; gap: 6px; }
.tk-q-qrow .rg-input { flex: 1; }
.tk-q-req { flex: none; color: var(--red-60); font: 700 15px/1 var(--font-sans); }
/* 하단 바: 답변 필수 / 복수 선택 토글 + 삭제 */
.tk-q-bar { display: flex; align-items: center; gap: 20px; margin-top: 2px; padding-top: 12px; border-top: 1px solid var(--gray-20); }
.tk-q-switch { display: inline-flex; align-items: center; gap: 8px; font: 600 13px/20px var(--font-sans); color: var(--gray-80); cursor: pointer; white-space: nowrap; }
.tk-q-bar-spacer { flex: 1; }
.tk-q-addbtn { align-self: flex-start; }
.tk-q-choice { display: flex; flex-direction: column; gap: 8px; padding-left: 0; }
.tk-q-opts { display: flex; flex-direction: column; gap: 6px; }
.tk-q-optrow { display: flex; align-items: center; gap: 8px; }
.tk-q-optrow .rg-input { flex: 1; }
.tk-q-optmark { flex: none; width: 18px; height: 18px; border: 1px solid #caced8; background: #fff; }
.tk-q-optmark.radio { border-radius: 50%; }
.tk-q-optmark.select { border-radius: 4px; }
.tk-add-xs { align-self: flex-start; height: 36px; padding: 0 16px; border: 0; border-radius: 4px; background: none; color: #5d6474; font: 600 13px/36px var(--font-sans); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.tk-add-xs:hover { background: var(--gray-10); }
.tk-add-xs svg { width: 16px; height: 16px; }
/* 질문 행 삭제 아이콘: Figma 40×40 아이콘 버튼(18px) */
.tk-q-row .rg-price-del svg, .tk-q-optrow .rg-price-del svg { width: 18px; height: 18px; }
.tk-q-add { display: flex; flex-wrap: wrap; gap: 6px; }
.rg-price-del:disabled { opacity: .35; cursor: not-allowed; }

/* 대표 사진 썸네일 */
.tk-thumb {
  width: 96px; height: 96px; border-radius: 6px; position: relative;
  background: linear-gradient(135deg, #dbeafe, #cfe0ff);
  display: flex; align-items: center; justify-content: center;
  font: 500 12px/16px var(--font-sans); color: #5d6474;
}
.tk-thumb button { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border: 0; border-radius: 50%; background: rgba(25,31,40,.6); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.tk-thumb button svg { width: 12px; height: 12px; }

/* ============================ 라이브 미리보기 (굿닥) ============================ */
.tk-preview { position: relative; padding: 4px 4px 0; display: flex; flex-direction: column; }
.tk-pv-scroll { flex: 1; overflow: hidden; border-radius: 20px 20px 0 0; }
.tk-pv-hero { height: 180px; background: repeating-linear-gradient(45deg, #f2f4f7, #f2f4f7 10px, #edf0f3 10px, #edf0f3 20px); display: flex; align-items: center; justify-content: center; font: 500 13px/18px var(--font-sans); color: #a8aebd; }
.tk-pv-hero.has { background: linear-gradient(135deg, #dbeafe, #cfe0ff); color: #5d6474; }
.tk-pv-body { padding: 16px; }
.tk-pv-title { font: 700 19px/27px var(--font-sans); color: #16181d; }
.tk-pv-title.ph { color: #a8aebd; }
.tk-pv-intro { font: 400 14px/21px var(--font-sans); color: #5d6474; margin-top: 6px; }
.tk-pv-kw { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
.tk-pv-kwchip { font: 500 12px/17px var(--font-sans); color: #6b7684; background: #f2f4f7; padding: 3px 8px; border-radius: 999px; }
.tk-pv-divider { height: 5px; background: #f2f4f7; margin: 16px -16px; }
.tk-pv-detail { font: 400 14px/22px var(--font-sans); color: #454c5a; white-space: pre-wrap; word-break: break-word; }
.tk-pv-detail-imgs { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.tk-pv-detail-img { height: 140px; border-radius: 8px; background: linear-gradient(135deg, #dbeafe, #cfe0ff); display: flex; align-items: center; justify-content: center; font: 500 12px/17px var(--font-sans); color: #5d6474; }
.tk-pv-price-head { font: 700 16px/24px var(--font-sans); color: #31353f; margin-bottom: 4px; }
.tk-pv-price-row { min-height: 46px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid #f6f7f9; }
.tk-pv-price-row:last-child { border-bottom: 0; }
.tk-pv-price-name { font: 500 14px/21px var(--font-sans); color: #31353f; }
.tk-pv-price-name.ph { color: #a8aebd; }
.tk-pv-price-val { font: 700 14px/21px var(--font-sans); color: #16181d; white-space: nowrap; display: flex; align-items: baseline; gap: 6px; }
.tk-pv-strike { font-weight: 500; color: #b0b8c1; text-decoration: line-through; }
.tk-pv-tag { text-align: center; font: 500 12px/16px var(--font-sans); color: #8b95a1; padding: 10px 0; background: #fff; }

/* ============================ 예약 신청 내역 (ap-*) ============================ */
.ap-header { padding: 40px 64px 20px; }
.ap-sub { font: 400 14px/22px var(--font-sans); color: var(--gray-60); margin-top: 6px; }
.ap-body { padding: 20px 64px 64px; }

/* 탭 */
.ap-tabs { display: flex; gap: 24px; align-items: center; }
.ap-tab { position: relative; border: 0; background: none; padding: 4px 0; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font: 500 20px/28px var(--font-sans); color: var(--gray-50); }
.ap-tab.on { font-weight: 700; color: var(--gray-100); }
.ap-tab-count { font: 600 13px/18px var(--font-sans); color: var(--gray-50); }
.ap-tab.on .ap-tab-count { color: var(--blue-60); }

/* 필터 (실제 DataDisplayDateFilter 재현: border 박스 + 기간/검색 라벨 2줄 + 우측 초기화/검색) */
.ap-filterbox { border: 2px solid var(--gray-30); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 12px; margin: 12px 0 20px; }
.ap-frow { display: flex; align-items: center; gap: 8px; }
.ap-flabel { flex: none; width: 48px; height: 40px; display: inline-flex; align-items: center; font: 600 14px/40px var(--font-sans); color: var(--gray-70); }
.ap-flabel.sm { width: auto; padding: 0 8px 0 16px; }
.ap-presets { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.ap-preset { height: 40px; padding: 0 16px; border: 1px solid var(--alpha-gray-20); border-radius: 6px; background: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font: 500 14px/38px var(--font-sans); color: var(--gray-70); }
.ap-preset:hover { background: var(--gray-10); }
.ap-preset.on { color: var(--gray-90); border-color: var(--gray-70); }
.ap-preset svg { width: 18px; height: 18px; }
.ap-daterange { display: inline-flex; align-items: center; gap: 8px; margin-left: 8px; }
.ap-daterange-sep { color: var(--gray-60); }
.ap-date { height: 40px; width: 140px; border: 1px solid var(--gray-40); border-radius: 6px; padding: 0 12px; font: 500 14px var(--font-sans); color: var(--gray-90); background: #fff; }
.ap-date:focus { outline: none; border-color: var(--blue-60); }
.ap-search-group { display: inline-flex; gap: 8px; align-items: center; }
.ap-searchfield { position: relative; width: 296px; }
.ap-searchfield-ic { position: absolute; top: 50%; left: 14px; transform: translateY(-50%); width: 16px; height: 16px; color: var(--gray-70); pointer-events: none; }
.ap-searchfield-input { width: 100%; height: 40px; border: 1px solid var(--gray-40); border-radius: 8px; padding: 0 14px 0 38px; font: 500 14px/38px var(--font-sans); color: var(--gray-100); background: #fff; }
.ap-searchfield-input::placeholder { color: var(--gray-50); }
.ap-searchfield-input:focus { outline: none; border-color: var(--blue-60); }
.ap-status-group { display: inline-flex; align-items: center; margin-left: 16px; }
.ap-actions-btns { margin-left: auto; display: inline-flex; gap: 6px; }
.ap-reset { width: 77px; height: 40px; border: 1px solid var(--gray-40); border-radius: 8px; background: #fff; cursor: pointer; font: 600 14px/38px var(--font-sans); color: var(--gray-70); }
.ap-reset:hover { background: var(--gray-10); }
.ap-submit { width: 77px; height: 40px; border: 0; border-radius: 8px; background: var(--blue-60); color: #fff; cursor: pointer; font: 600 14px/40px var(--font-sans); }
.ap-submit:hover { background: var(--blue-70); }
.ap-frow .ap-dd-btn { height: 40px; line-height: 38px; }

/* 드롭다운 */
.ap-dd { position: relative; }
.ap-dd-btn { width: 100%; height: 38px; padding: 0 12px 0 14px; border: 1px solid var(--gray-40); border-radius: 8px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; font: 500 14px/36px var(--font-sans); color: var(--gray-90); }
.ap-dd-btn.open { border-color: var(--blue-60); }
.ap-dd-ic { width: 16px; height: 16px; color: var(--gray-60); flex: none; display: inline-flex; }
.ap-dd-menu { position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 20; padding: 4px; background: #fff; border: 1px solid var(--gray-30); border-radius: 8px; box-shadow: 0 2px 8px rgba(22,24,29,.1); display: flex; flex-direction: column; }
.ap-dd-opt { height: 34px; border: 0; border-radius: 6px; background: none; text-align: left; padding: 0 10px; cursor: pointer; font: 500 14px/34px var(--font-sans); color: var(--gray-80); }
.ap-dd-opt:hover { background: var(--gray-10); }
.ap-dd-opt.active { background: var(--alpha-blue-10); color: var(--blue-60); font-weight: 600; }

/* 상세 모달 (행 클릭) */
.ap-detail { width: 480px; max-height: calc(100vh - 48px); overflow: hidden; display: flex; flex-direction: column; }
.ap-detail-head { display: flex; align-items: center; justify-content: space-between; }
.ap-detail-eyebrow { font: 600 14px/20px var(--font-sans); color: var(--gray-90); }
.ap-detail-close { width: 28px; height: 28px; border: 0; background: none; cursor: pointer; color: var(--gray-60); display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; }
.ap-detail-close:hover { background: var(--gray-10); }
.ap-detail-close svg { width: 18px; height: 18px; }
.ap-detail-title { display: flex; align-items: center; gap: 10px; margin: 12px 0 4px; }
.ap-detail-chan { display: inline-flex; align-items: center; gap: 6px; font: 600 14px/20px var(--font-sans); color: var(--gray-80); }
.ap-detail-chan .ap-chan-ic svg { height: 18px; }

/* 스크롤 본문 + 섹션 */
.ap-detail-scroll { flex: 1; overflow-y: auto; margin: 12px -4px 0; padding: 0 4px; }
.ap-dsec { padding: 14px 0; border-top: 1px solid var(--gray-20); }
.ap-dsec:first-child { border-top: 0; padding-top: 4px; }
.ap-dsec-title { display: flex; align-items: center; gap: 6px; font: 700 14px/20px var(--font-sans); color: var(--gray-100); margin-bottom: 6px; }
.ap-dsec-badge { font: 500 11px/16px var(--font-sans); color: var(--gray-60); background: var(--gray-20); border-radius: 4px; padding: 1px 6px; }
.ap-cancel-reason { font: 500 13px/20px var(--font-sans); color: var(--red-70); background: var(--alpha-red-05); border-radius: 8px; padding: 10px 12px; }

/* 상단 상태 헤더 (실제 AppointmentStatus의 title+content 언어) */
.ap-detail-status { margin-top: 12px; padding: 14px 16px; border-radius: 10px; background: var(--gray-10); }
.ap-detail-status-row { display: flex; align-items: center; gap: 8px; }
.ap-detail-status-desc { margin: 8px 0 0; font: 500 13px/19px var(--font-sans); color: var(--gray-70); }

/* 안내 배너 (취소 사유 등 — 실제 GuideBanner) */
.ap-guide { display: flex; gap: 8px; margin-top: 12px; padding: 12px 14px; border-radius: 10px; background: var(--alpha-red-05); }
.ap-guide-ic { flex: none; color: var(--red-60); display: inline-flex; }
.ap-guide-ic svg { width: 18px; height: 18px; }
.ap-guide-title { font: 700 13px/18px var(--font-sans); color: var(--red-70); margin-bottom: 2px; }
.ap-guide-text { font: 500 13px/19px var(--font-sans); color: var(--gray-90); word-break: break-word; }

/* 추가 질문·답변 (실제 상세의 추가 질문/답변 내용) */
.ap-qa-list { display: flex; flex-direction: column; gap: 10px; margin-top: 2px; }
.ap-request { min-height: 40px; padding: 10px 12px; border-radius: 8px; background: var(--gray-10); color: var(--gray-90); font: 500 14px/21px var(--font-sans); white-space: pre-wrap; word-break: break-word; }
.ap-request.empty { color: var(--gray-50); }
.ap-additional-answers { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--gray-20); }
.ap-additional-title { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; color: var(--gray-80); font: 600 13px/20px var(--font-sans); }
.ap-additional-title svg { width: 18px; height: 18px; flex: none; }
.ap-qa { background: var(--gray-10); border-radius: 8px; padding: 12px 14px; }
.ap-qa-q { display: flex; gap: 6px; font: 600 14px/21px var(--font-sans); color: var(--gray-90); }
.ap-qa-a { display: flex; gap: 6px; margin-top: 6px; font: 500 14px/21px var(--font-sans); color: var(--gray-80); }
.ap-qa-mark { flex: none; width: 18px; height: 18px; margin-top: 1px; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; font: 700 11px/1 var(--font-sans); background: var(--gray-30); color: var(--gray-70); }
.ap-qa-mark.a { background: var(--alpha-blue-10); color: var(--blue-60); }

/* 예약자=방문자 동일 / 병원 메모 */
.ap-same-note { font: 500 14px/22px var(--font-sans); color: var(--gray-60); padding: 7px 0; }
.ap-memo-box { font: 500 14px/21px var(--font-sans); color: var(--gray-90); background: var(--gray-10); border-radius: 8px; padding: 12px 14px; white-space: pre-wrap; word-break: break-word; }
.ap-memo-box.empty { color: var(--gray-50); }

/* 상세 정보 행 */
.ap-drow { display: flex; gap: 12px; padding: 7px 0; }
.ap-drow-label { flex: none; width: 100px; font: 500 14px/22px var(--font-sans); color: var(--gray-60); }
.ap-drow-val { flex: 1; display: inline-flex; align-items: center; font: 500 14px/22px var(--font-sans); color: var(--gray-90); word-break: break-word; }

/* 상태 변경 이력 타임라인 */
.ap-timeline { display: flex; flex-direction: column; padding-left: 2px; }
.ap-tl-item { position: relative; display: flex; align-items: center; gap: 8px; padding: 6px 0 6px 16px; }
.ap-tl-item::before { content: ''; position: absolute; left: 3px; top: 14px; bottom: -6px; width: 1px; background: var(--gray-30); }
.ap-tl-item.last::before { display: none; }
.ap-tl-dot { position: absolute; left: 0; top: 11px; width: 7px; height: 7px; border-radius: 50%; background: var(--gray-40); }
.ap-tl-item.last .ap-tl-dot { background: var(--blue-60); }
.ap-tl-label { font: 600 13px/20px var(--font-sans); color: var(--gray-90); }
.ap-tl-at { font: 400 12px/16px var(--font-sans); color: var(--gray-60); margin-left: auto; }

.ap-detail-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--gray-20); }
.ap-detail-actions .ap-btn { flex: 1; height: 46px; padding: 0 16px; line-height: 46px; font-size: 15px; border-radius: 10px; }

/* 테이블 */
.ap-table { border: 1px solid var(--gray-30); border-radius: 8px; overflow: hidden; }
.ap-tr { display: grid; grid-template-columns: 84px 176px minmax(0,1.3fr) 56px 128px 128px minmax(0,1.4fr); align-items: center; gap: 12px; padding: 0 20px; }
.ap-th { min-height: 44px; background: var(--gray-10); border-bottom: 1px solid var(--gray-30); font: 600 13px/18px var(--font-sans); color: var(--gray-60); }
.ap-row { min-height: 68px; border-bottom: 1px solid var(--gray-20); }
.ap-row:last-child { border-bottom: 0; }
.ap-row:hover { background: var(--alpha-blue-05); }
.ap-empty { padding: 60px 0; text-align: center; font: 500 14px/22px var(--font-sans); color: var(--gray-50); }
.ap-total { margin-top: 12px; font: 500 13px/18px var(--font-sans); color: var(--gray-60); }

/* 채널 셀 (테이블=아이콘만 / 모달=아이콘+라벨) */
.ap-chan { display: inline-flex; align-items: center; gap: 6px; }
.ap-chan-ic { display: inline-flex; align-items: center; justify-content: center; height: 20px; }
.ap-chan-ic svg { display: block; height: 20px; width: auto; }
.ap-chan-ic.only { height: 22px; }
.ap-chan-ic.only svg { height: 22px; }
.ap-chan-label { font: 500 13px/18px var(--font-sans); color: var(--gray-80); white-space: nowrap; }

/* 2줄 셀 */
.ap-2line { display: flex; flex-direction: column; min-width: 0; }
.ap-2line-p { font: 400 14px/20px var(--font-sans); color: var(--gray-90); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ap-2line-s { font: 400 12px/16px var(--font-sans); color: var(--gray-60); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }

/* 상태 태그 */
.ap-tag { display: inline-flex; align-items: center; height: 24px; padding: 0 8px; border-radius: 6px; font: 600 12px/24px var(--font-sans); white-space: nowrap; }
.ap-tag.orange { background: rgba(247,144,9,.12); color: var(--orange-60); }
.ap-tag.blue { background: var(--alpha-blue-10); color: var(--blue-70); }
.ap-tag.green { background: rgba(31,169,114,.12); color: var(--green-80); }
.ap-tag.red { background: var(--alpha-red-10); color: var(--red-70); }
.ap-tag.gray { background: var(--gray-20); color: var(--gray-70); }

/* 요청사항 + 행 액션 */
.ap-memo-cell { position: relative; min-width: 0; }
.ap-memo { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; font: 500 13px/19px var(--font-sans); color: var(--gray-80); }
.ap-actions { position: absolute; inset: 0; display: none; align-items: center; justify-content: flex-end; gap: 6px; background: linear-gradient(90deg, transparent, var(--white) 24px); padding-left: 24px; }
.ap-row:hover .ap-actions { display: flex; }
.ap-btn { height: 32px; padding: 0 12px; border: 0; border-radius: 6px; cursor: pointer; font: 600 13px/32px var(--font-sans); white-space: nowrap; }
.ap-btn.primary { background: var(--alpha-blue-10); color: var(--blue-60); }
.ap-btn.primary:hover { background: var(--alpha-blue-15); }
.ap-btn.danger { background: var(--alpha-red-10); color: var(--red-70); }
.ap-btn.danger:hover { background: var(--alpha-red-15); }

/* 취소 모달 */
/* 모달은 브라우저 뷰포트 기준으로 띄운다(fixed) — 832px 고정 아트보드 기준(absolute)이면 짧은 창에서 세로 중앙이 화면 밖으로 밀려 잘림. padding으로 상하 최소 여백 확보. */
.ap-dim { position: fixed; inset: 0; background: rgba(22,24,29,.45); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 30; }
.ap-modal { width: 440px; max-height: calc(100vh - 48px); overflow-y: auto; background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 12px 40px rgba(22,24,29,.2); }
.ap-modal-title { font: 700 18px/26px var(--font-sans); color: var(--gray-100); }
.ap-modal-sub { font: 400 13px/20px var(--font-sans); color: var(--gray-60); margin-top: 6px; }
.ap-reasons { display: flex; flex-wrap: wrap; gap: 6px; margin: 16px 0 10px; }
.ap-reason { height: 32px; padding: 0 12px; border: 1px solid var(--gray-40); border-radius: 999px; background: #fff; cursor: pointer; font: 500 13px/30px var(--font-sans); color: var(--gray-80); }
.ap-reason:hover { border-color: var(--blue-60); color: var(--blue-70); background: var(--alpha-blue-05); }
.ap-textarea { width: 100%; height: 96px; border: 1px solid var(--gray-40); border-radius: 8px; padding: 10px 14px; resize: none; font: 500 14px/21px var(--font-sans); color: var(--gray-100); }
.ap-textarea:focus { outline: none; border-color: var(--blue-60); }
.ap-modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.ap-btn-cancel-confirm { height: 44px; padding: 0 20px; border: 0; border-radius: 10px; background: var(--red-60); color: #fff; cursor: pointer; font: 700 14px/44px var(--font-sans); }
.ap-btn-cancel-confirm:disabled { background: var(--gray-20); color: var(--gray-50); cursor: not-allowed; }

/* =============================================================
   운영 설정 (set-) — 실제 non-payment-reservations/operation 재현
   BoxContainer / GuideBanner(normal) / Toggle(rg-toggle 재사용)
   ============================================================= */
.set-header { padding: 40px 64px 20px; }
.set-body { padding: 20px 64px 64px; display: flex; flex-direction: column; gap: 40px; }

/* BoxContainer */
.set-box {
  display: flex; align-items: center; justify-content: space-between; gap: 48px;
  padding: 24px; border: 1px solid var(--gray-30); border-radius: 8px;
  transition: border-color 0.15s;
}
.set-box:hover { border-color: var(--gray-50); }
.set-box-left { min-width: 0; }
.set-box-title { font: 600 16px/1.5 var(--font-sans); color: var(--gray-100); }
.set-box-sub { margin-top: 1px; font: 400 14px/1.5 var(--font-sans); color: var(--gray-70); }
.set-box-right { display: flex; flex-shrink: 0; gap: 16px; align-items: center; }

/* 비급여 예약 받기 — 개수 강조 + 운영중/미운영 라벨 */
.set-count { font: 500 14px/1.5 var(--font-sans); color: var(--gray-80); }
.set-count-rest { font: 400 14px/1.5 var(--font-sans); color: var(--gray-70); }
.set-status-toggle { display: flex; align-items: center; gap: 8px; }
.set-status { font: 600 14px/1.5 var(--font-sans); color: var(--blue-70); }
.set-status.off { color: var(--gray-60); }

/* 설정 섹션 */
.set-section { display: flex; flex-direction: column; gap: 12px; }
.set-section-title { font: 700 18px/1.5 var(--font-sans); color: var(--gray-100); }

/* GuideBanner (normal variant) */
.set-banner {
  display: flex; align-items: center; gap: 16px; height: 54px;
  padding: 0 20px 0 16px;
  background: var(--alpha-gray-05); border: 1px solid var(--alpha-gray-10); border-radius: 8px;
}
.set-banner-left { display: flex; flex: 1; gap: 8px; align-items: center; min-width: 0; }
.set-banner-ic { width: 20px; height: 20px; flex: none; color: var(--gray-60); display: inline-flex; }
.set-banner-ic svg { width: 20px; height: 20px; display: block; }
.set-banner-msg { font: 600 14px/1.5 var(--font-sans); color: var(--gray-80); }
.set-banner-action {
  display: flex; gap: 4px; align-items: center; height: 36px; white-space: nowrap;
  cursor: pointer; border: 0; background: none;
  font: 600 13px/1.5 var(--font-sans); color: rgba(0, 0, 0, 0.7);
}
.set-banner-arrow { width: 16px; height: 16px; flex: none; color: rgba(0, 0, 0, 0.7); display: inline-flex; align-items: center; justify-content: center; }
.set-banner-arrow svg { width: 12px; height: 12px; display: block; }

/* 중지 확인 모달 (StopConfirmModal, width 560) */
.set-modal { width: 560px; }
.set-modal-body { margin-top: 12px; font: 500 16px/1.5 var(--font-sans); color: var(--gray-60); }
.set-modal-danger {
  height: 44px; padding: 0 20px; border: 0; border-radius: 10px;
  background: var(--red-60); color: #fff; cursor: pointer; font: 700 14px/44px var(--font-sans);
}
.set-modal-danger:hover { background: var(--red-70); }

# GCP-1 \uC815\uCC45 \uC694\uC57D

> \uC774 \uBB38\uC11C\uB294 \uACF5\uAC1C \uD504\uB85C\uD1A0\uD0C0\uC785\uC5D0\uC11C \uC0AC\uC6A9\uD558\uB294 \uC815\uCC45 \uC694\uC57D\uC785\uB2C8\uB2E4. \uC6D0\uBCF8 PRD \uC804\uCCB4\uB97C \uBCF5\uC81C\uD558\uC9C0 \uC54A\uC73C\uBA70, \uC6D0\uBCF8 \uC815\uCC45\uC744 \uB3C5\uB9BD\uC801\uC73C\uB85C \uC218\uC815\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.

## \uBAA9\uC801

- \uBCD1\uC6D0\uC774 \uB4F1\uB85D\uD55C \uC9C4\uB8CC\uD56D\uBAA9\uC744 \uAD7F\uB2E5\uACFC \uC678\uBD80 \uC608\uC57D \uCC44\uB110\uC5D0\uC11C \uC77C\uAD00\uB418\uAC8C \uC6B4\uC601\uD569\uB2C8\uB2E4.
- \uCC44\uB110\uBCC4 \uC608\uC57D \uC2E0\uCCAD\uC740 Connect\uC758 \uAE30\uC874 \uC6B4\uC601 \uD750\uB984 \uC548\uC5D0\uC11C \uD568\uAED8 \uAD00\uB9AC\uD569\uB2C8\uB2E4.

## \uD604\uC7AC \uD504\uB85C\uD1A0\uD0C0\uC785 \uBC18\uC601 \uAE30\uC900

- \uC9C4\uB8CC\uD56D\uBAA9 \uBAA9\uB85D\uC5D0\uC11C \uAD7F\uB2E5\uACFC \uCE74\uCE74\uC624\uD1A1 \uC608\uC57D\uD558\uAE30\uC758 \uB178\uCD9C \uC0C1\uD0DC\uB97C \uD568\uAED8 \uD655\uC778\uD569\uB2C8\uB2E4.
- \uCE74\uCE74\uC624 \uB178\uCD9C \uC5EC\uBD80\uC640 \uCE74\uCE74\uC624 \uC804\uC6A9 \uC815\uBCF4\uB294 \uC9C4\uB8CC\uD56D\uBAA9 \uC0C1\uC138\uC5D0\uC11C \uAD00\uB9AC\uD569\uB2C8\uB2E4.
- V1\uC5D0\uC11C\uB294 \uAD7F\uB2E5\uC5D0 \uB178\uCD9C \uC911\uC778 \uC9C4\uB8CC\uD56D\uBAA9\uB9CC \uCE74\uCE74\uC624\uD1A1 \uC608\uC57D\uD558\uAE30\uC5D0\uB3C4 \uB178\uCD9C\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.
- \uAD7F\uB2E5 \uB178\uCD9C\uC744 \uB044\uBA74 \uCE74\uCE74\uC624 \uB178\uCD9C\uB3C4 \uD568\uAED8 \uB044\uACE0, \uCE74\uCE74\uC624\uB9CC \uB044\uB294 \uAC83\uC740 \uD5C8\uC6A9\uD569\uB2C8\uB2E4.
- \uAD7F\uB2E5\uACFC \uCE74\uCE74\uC624 \uC608\uC57D\uC740 \uC608\uC57D \uC2E0\uCCAD \uB0B4\uC5ED\uC5D0\uC11C \uCC44\uB110\uC744 \uAD6C\uBD84\uD574 \uD568\uAED8 \uCC98\uB9AC\uD569\uB2C8\uB2E4.
- \uCE74\uCE74\uC624\uC5D0\uC11C \uC218\uC9D1\uB41C \uCD94\uAC00 \uC9C8\uBB38\xB7\uB2F5\uBCC0\uC774 \uC788\uB294 \uACBD\uC6B0, \uBAA8\uB4E0 \uC608\uC57D \uC0C1\uD0DC\uC758 \uAC1C\uBCC4 \uC0C1\uC138 \`\uC694\uCCAD\uC0AC\uD56D\` \uD558\uC704\uC5D0 \uC608\uC57D \uB2F9\uC2DC \uBB38\uAD6C\uC640 \uC21C\uC11C\uB300\uB85C \uD45C\uC2DC\uD569\uB2C8\uB2E4. \uB370\uC774\uD130\uAC00 \uC5C6\uC73C\uBA74 \uCD94\uAC00 \uC601\uC5ED\uC740 \uD45C\uC2DC\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.
- \uBE44\uAE09\uC5EC \uC608\uC57D \uC6B4\uC601 \uC5EC\uBD80\uC640 \uC8FC\uC694 \uC870\uAC74\uC740 Connect\uC758 \uC6B4\uC601 \uC124\uC815\uC5D0\uC11C \uAD00\uB9AC\uD569\uB2C8\uB2E4.
