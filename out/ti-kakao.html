.tk-price-preview-row:last-child { border-bottom: 0; }
.tk-price-preview-row strong { color: var(--gray-100); overflow-wrap: anywhere; }
.tk-price-preview-row em { color: var(--gray-60); font-style: normal; text-align: right; }
.tk-price-preview-row.error { border: 1px solid var(--red-60); border-radius: 7px; background: #fff6f6; }
.tk-price-preview-row .rg-error { grid-column: 1 / -1; margin: -2px 0 0; }
.ap-table.no-channel .ap-tr { grid-template-columns: 84px 176px minmax(0,1.3fr) 128px 128px minmax(0,1.4fr); }
.ap-status-stack { display: flex; align-items: flex-start; flex-direction: column; gap: 5px; }

## \uD604\uC7AC \uD504\uB85C\uD1A0\uD0C0\uC785 \uBC18\uC601 \uAE30\uC900

- \uC9C4\uB8CC\uD56D\uBAA9 \uBAA9\uB85D\uC5D0\uC11C \uAD7F\uB2E5\uACFC \uCE74\uCE74\uC624\uD1A1 \uC608\uC57D\uD558\uAE30\uC758 \uB178\uCD9C \uC0C1\uD0DC\uB97C \uD568\uAED8 \uD655\uC778\uD569\uB2C8\uB2E4. \uBAA9\uB85D\uC758 \uCC44\uB110 \uC2EC\uBCFC\uC740 \uC77D\uAE30 \uC804\uC6A9 \uD604\uD669\uC774\uBA70 \uCE74\uCE74\uC624 \uB178\uCD9C \uC124\uC815\uC740 \uC0C1\uC138\uC5D0\uC11C \uBCC0\uACBD\uD569\uB2C8\uB2E4.
- \uCE74\uCE74\uC624 \uB178\uCD9C \uC5EC\uBD80\uC640 \uCE74\uCE74\uC624 \uC804\uC6A9 \uC815\uBCF4\uB294 \uC9C4\uB8CC\uD56D\uBAA9 \uC0C1\uC138\uC5D0\uC11C \uAD00\uB9AC\uD569\uB2C8\uB2E4. \uCE74\uCE74\uC624 \uB178\uCD9C\uC744 ON\uD558\uBA74 \uBCC4\uB3C4 \uCD94\uAC00 \uD1A0\uAE00 \uC5C6\uC774 \uC804\uC6A9 \uC785\uB825 \uD544\uB4DC\uB97C \uC989\uC2DC \uD45C\uC2DC\uD569\uB2C8\uB2E4.
- V1\uC5D0\uC11C\uB294 \uAD7F\uB2E5\uC5D0 \uB178\uCD9C \uC911\uC778 \uC9C4\uB8CC\uD56D\uBAA9\uB9CC \uCE74\uCE74\uC624\uD1A1 \uC608\uC57D\uD558\uAE30\uC5D0\uB3C4 \uB178\uCD9C\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.
- \uAD7F\uB2E5 \uB178\uCD9C\uC744 \uB044\uBA74 \uCE74\uCE74\uC624 \uB178\uCD9C\uB3C4 \uD568\uAED8 \uB044\uACE0, \uCE74\uCE74\uC624\uB9CC \uB044\uB294 \uAC83\uC740 \uD5C8\uC6A9\uD569\uB2C8\uB2E4. \uAD7F\uB2E5\uC744 \uB2E4\uC2DC \uCF1C\uB3C4 \uCE74\uCE74\uC624 \uB178\uCD9C\uC740 \uC790\uB3D9\uC73C\uB85C \uCF1C\uC9C0\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.
- \uAD7F\uB2E5\uACFC \uCE74\uCE74\uC624 \uC608\uC57D\uC740 \uC608\uC57D \uC2E0\uCCAD \uB0B4\uC5ED\uC5D0\uC11C \uCC44\uB110\uC744 \uAD6C\uBD84\uD574 \uD568\uAED8 \uCC98\uB9AC\uD558\uBA70, \uCC44\uB110 \uC5F4\uC740 \uC9C4\uB8CC\uD56D\uBAA9\uACFC \uBC29\uBB38\uC790 \uC0AC\uC774\uC5D0 \uD45C\uC2DC\uD569\uB2C8\uB2E4.
- \uC608\uC57D \uCC44\uB110\uC740 \uD604\uC7AC \uC0C1\uD488 \uC0C1\uD0DC\uAC00 \uC544\uB2C8\uB77C \uD574\uB2F9 \uC608\uC57D\uC774 \uC2E4\uC81C\uB85C \uC720\uC785\uB41C \uCC44\uB110\uC744 \uAE30\uC900\uC73C\uB85C \uD45C\uC2DC\uD569\uB2C8\uB2E4.
- \uCE74\uCE74\uC624\uC5D0\uC11C \uC218\uC9D1\uB41C \uCD94\uAC00 \uC9C8\uBB38\xB7\uB2F5\uBCC0\uC774 \uC788\uB294 \uACBD\uC6B0, \uBAA8\uB4E0 \uC608\uC57D \uC0C1\uD0DC\uC758 \uAC1C\uBCC4 \uC0C1\uC138 \`\uC694\uCCAD\uC0AC\uD56D\` \uD558\uC704\uC5D0 \uC608\uC57D \uB2F9\uC2DC \uBB38\uAD6C\uC640 \uC21C\uC11C\uB300\uB85C \uD45C\uC2DC\uD569\uB2C8\uB2E4. \uB370\uC774\uD130\uAC00 \uC5C6\uC73C\uBA74 \uCD94\uAC00 \uC601\uC5ED\uC740 \uD45C\uC2DC\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.
- \uBE44\uAE09\uC5EC \uC608\uC57D \uC6B4\uC601\uC744 \uC911\uC9C0\uD558\uBA74 \uC2E0\uADDC \uC608\uC57D \uC2AC\uB86F \uC81C\uACF5\uC744 \uC911\uB2E8\uD558\uC9C0\uB9CC \uB4F1\uB85D\uB41C \uC9C4\uB8CC\uD56D\uBAA9\uACFC \uAE30\uC874 \uC608\uC57D\uC740 \uC720\uC9C0\uD569\uB2C8\uB2E4.
- \uC0C1\uD488\uBCC4 \uB178\uCD9C \uC758\uB3C4, \uD604\uC7AC \uC608\uC57D \uAC00\uB2A5 \uC5EC\uBD80, \uC678\uBD80 \uC2E4\uC81C \uC0C1\uD0DC\uC640 \uB3D9\uAE30\uD654 \uC0C1\uD0DC\uB97C \uAD6C\uBD84\uD569\uB2C8\uB2E4. \uC678\uBD80 \uBC18\uC601 \uC804\uC5D0\uB294 \`\uB178\uCD9C \uC911\`\uC73C\uB85C \uD45C\uC2DC\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.
- \uB178\uCD9C \uC758\uB3C4\uC640 \uC678\uBD80 \uBC18\uC601 \uC0C1\uD0DC\uB294 \uB0B4\uBD80\uC801\uC73C\uB85C \uAD6C\uBD84\uD558\uACE0 \uC2E4\uD328 \uC791\uC5C5\uB9CC \uC548\uC804\uD558\uAC8C \uC7AC\uCC98\uB9AC\uD569\uB2C8\uB2E4. \uC774\uB97C \uC870\uC791\uD558\uB294 \uC0C1\uD0DC \uC120\uD0DD\uAE30\uB098 \uAE30\uC220 \uC0C1\uD0DC\uD45C\uB294 \uBCD1\uC6D0 \uC81C\uD488 \uD654\uBA74\uC5D0 \uCD94\uAC00\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.
- \uC0C1\uC138\uC5D0\uC11C \uCD5C\uCD08 \uCE74\uCE74\uC624 ON \uC2DC \uACF5\uD1B5\uC815\uBCF4\uB97C \uC804\uC6A9 \uD544\uB4DC\uC5D0 \uCC44\uC6B0\uACE0 \uC774\uD6C4\uC5D0\uB294 \uBCC4\uB3C4\uB85C \uBCF4\uC874\uD569\uB2C8\uB2E4. \uB178\uCD9C\uBA85\xB7\uC124\uBA85\xB7\uC774\uBBF8\uC9C0\xB7\uD0A4\uC6CC\uB4DC\xB7\uCD94\uAC00 \uC9C8\uBB38\xB7\uC774\uC6A9 \uBC29\uBC95\xB7\uC720\uC758\uC0AC\uD56D\xB7\uBC29\uBB38 \uC548\uB0B4\uB97C \uC800\uC7A5\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.
- \uAC00\uACA9 \uC635\uC158\uBCC4 \uCE74\uCE74\uC624 \`Price.description\` \uCD5C\uC885 \uBB38\uAD6C\uB97C \uBBF8\uB9AC \uBCF4\uC5EC\uC8FC\uACE0 100\uC790\uB97C \uB118\uC73C\uBA74 \uC800\uC7A5\uC744 \uB9C9\uC2B5\uB2C8\uB2E4. \uAC00\uACA9 \uC635\uC158\uC774 1\uAC1C\uC640 \uBCF5\uC218 \uC0AC\uC774\uB97C \uC624\uAC00\uB294 \uBCC0\uACBD\uC740 \uC678\uBD80 Product \uAD50\uCCB4 \uC815\uCC45\uC774 \uD655\uC815\uB418\uAE30 \uC804\uAE4C\uC9C0 \uCC28\uB2E8\uD569\uB2C8\uB2E4.
- \uAD7F\uB2E5 \uC800\uC7A5 \uC131\uACF5\uACFC \uCE74\uCE74\uC624 \uBC18\uC601 \uC131\uACF5\uC744 \uBD84\uB9AC\uD558\uACE0 Product\xB7DEFAULT Item\xB7Price\xB7Schedule\uBCC4 \uC0C1\uD0DC\uC640 \uC2E4\uD328 \uC0AC\uC720\uB294 \uB0B4\uBD80 \uB3D9\uAE30\uD654\xB7\uAD00\uC81C \uC815\uBCF4\uB85C \uAD00\uB9AC\uD569\uB2C8\uB2E4.
- \uD65C\uC131 \uB610\uB294 \uBBF8\uB798 \uC608\uC57D\uC774 \uC788\uB294 \uC9C4\uB8CC\uD56D\uBAA9\uC740 \uBB3C\uB9AC \uC0AD\uC81C\uD558\uC9C0 \uC54A\uACE0 \uC6B4\uC601\uC744 \uC911\uC9C0\uD558\uBA70 \uAE30\uC874 \uC608\uC57D\uACFC \uC678\uBD80 \uB9E4\uD551\uC744 \uBCF4\uC874\uD569\uB2C8\uB2E4.
- \uBE44\uAE09\uC5EC \uC608\uC57D \uC804\uCCB4 OFF\uB294 \uC0C1\uD488\uBCC4 \uB178\uCD9C \uC758\uB3C4\uB97C \uBCF4\uC874\uD55C \uCC44 \uC678\uBD80 Product\xB7\uD5A5\uD6C4 Schedule\uC744 \uB178\uCD9C \uBCF4\uB958\uB85C \uC804\uD658\uD569\uB2C8\uB2E4. \uB2E4\uC2DC ON\uD558\uBA74 \uC720\uD6A8\uD55C \uC0C1\uD488\uB9CC \uC120\uBCC4\uD574 \uC678\uBD80 \uBC18\uC601 \uC131\uACF5 \uD6C4 \uBCF5\uC6D0\uD569\uB2C8\uB2E4.
- \uC790\uB3D9 \uD655\uC815\uACFC \uB2F9\uC77C \uC608\uC57D \uC124\uC815\uC740 \uC678\uBD80 \uC608\uC57D\uC5D0\uB3C4 \uC801\uC6A9\uD569\uB2C8\uB2E4. \uC2E0\uADDC \uC608\uC57D \uC54C\uB9BC\uC740 \uC720\uC785 \uCC44\uB110\uACFC \uBB34\uAD00\uD558\uAC8C \uAC19\uC740 \uBCD1\uC6D0 \uC124\uC815\uC73C\uB85C \uC608\uC57D\uB2F9 \uD55C \uBC88\uB9CC \uBC1C\uD589\uD569\uB2C8\uB2E4.
- \uC608\uC57D\uC5D0\uB294 \uB2F9\uC2DC \uC0C1\uD488\xB7\uAC00\uACA9\xB7\uCC44\uB110\xB7\uC790\uB3D9 \uD655\uC815 \uC124\uC815\uC744 \uBCF4\uC874\uD558\uACE0 \uC678\uBD80 \uC0C1\uD0DC \uBC18\uC601 \uC2E4\uD328\uB294 \uB0B4\uBD80 \uC7AC\uCC98\uB9AC\uD569\uB2C8\uB2E4. \uC678\uBD80 ID\xB7\uC801\uC6A9 \uBC84\uC804\xB7\uC54C\uB9BC \uBC1C\uD589 \uACB0\uACFC \uAC19\uC740 \uC9C4\uB2E8 \uC815\uBCF4\uB294 \uBCD1\uC6D0 \uD654\uBA74\uC5D0 \uCD94\uAC00\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.

## \uC678\uBD80 \uC608\uC57D \uD750\uB984

1. \uCE74\uCE74\uC624\uC5D0\uC11C \uC9C4\uB8CC\uD56D\uBAA9\uD615 \uC0C1\uD488, \uAC00\uACA9 \uC635\uC158\uACFC \uC77C\uC815\uC744 \uC120\uD0DD\uD569\uB2C8\uB2E4.
2. \uCE74\uCE74\uC624\uC5D0\uC11C \uC608\uC57D\uC790\xB7\uBC29\uBB38\uC790 \uAE30\uBCF8\uC815\uBCF4\uC640 \uB3D9\uC758\uB97C \uC785\uB825\uD569\uB2C8\uB2E4.
3. \uAD7F\uB2E5 \uC608\uC57D \uC6F9\uBDF0\uB85C \uC774\uB3D9\uD574 \uD544\uC694\uD55C \uCD94\uAC00\uC815\uBCF4\uB97C \uC785\uB825\uD569\uB2C8\uB2E4.
4. \uAD7F\uB2E5\uC774 \uBCD1\uC6D0 \uC6B4\uC601 \uAC00\uB2A5 \uC5EC\uBD80\uC640 \uACF5\uD1B5 \uC608\uC57D \uC2AC\uB86F\uC744 \uCD5C\uC885 \uD655\uC778\uD569\uB2C8\uB2E4.
5. \uC870\uAC74\uC744 \uB9CC\uC871\uD558\uBA74 \uD1B5\uD569 \uC608\uC57D \uC6D0\uC7A5\uC5D0 \uD55C \uBC88\uB9CC \uC0DD\uC131\uD558\uACE0, \uB9C8\uAC10 \uB610\uB294 \uC624\uB958\uC774\uBA74 \uC7AC\uC120\uD0DD \uC548\uB0B4\uB97C \uD45C\uC2DC\uD569\uB2C8\uB2E4.

\`DEFAULT Item\`\uC740 \uC678\uBD80 API \uAD6C\uC870\uB97C \uB9DE\uCD94\uB294 \uAE30\uC220 \uAC1D\uCCB4\uC774\uBA70 \uD658\uC790\uC5D0\uAC8C \uBCC4\uB3C4 \uC120\uD0DD \uB2E8\uACC4\uB85C \uC81C\uACF5\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.

## \uAC80\uD1A0 \uC911\uC778 \uD654\uBA74 \uB178\uCD9C \uC870\uAC74

> \uC544\uB798 \uD56D\uBAA9\uC740 \uC6D0\uBCF8 PRD\uAC00 review \uC0C1\uD0DC\uC778 \uC608\uC815 \uC870\uAC74\uC774\uBA70, \uD504\uB85C\uD1A0\uD0C0\uC785\uC758 \`\uC608\uC815\uB41C \uB0B4\uC6A9\uB3C4 \uBCF4\uAE30\`\uB97C \uCF30\uC744 \uB54C \uD655\uC778\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.

- **\uBCD1\uC6D0 \uB2E8\uC704 \uCE74\uCE74\uC624 \uC5F0\uB3D9 \uC5EC\uBD80**\uB294 \uC9C4\uB8CC\uD56D\uBAA9 \uBAA9\uB85D\uC758 \uCE74\uCE74\uC624 \uCC44\uB110 \uC815\uBCF4, \uC9C4\uB8CC\uD56D\uBAA9 \uC0C1\uC138\uC758 \uCE74\uCE74\uC624 \uC124\uC815 \uC601\uC5ED, \uC608\uC57D \uC2E0\uCCAD \uB0B4\uC5ED\uC758 \uCC44\uB110 \uC5F4\uC744 \uD45C\uC2DC\uD560\uC9C0 \uACB0\uC815\uD569\uB2C8\uB2E4.
- **\uAC1C\uBCC4 \uC9C4\uB8CC\uD56D\uBAA9\uC758 \uCE74\uCE74\uC624 \uC5F0\uB3D9 \uC5EC\uBD80**\uB294 \uC704 \uC601\uC5ED\uB4E4\uC758 \uD45C\uC2DC \uC5EC\uBD80\uAC00 \uC544\uB2C8\uB77C \uD574\uB2F9 \uC0C1\uD488\uC758 \uCE74\uCE74\uC624 \uB178\uCD9C \uC0C1\uD0DC\uC640 \uC804\uC6A9 \uC785\uB825 \uD544\uB4DC \uC0C1\uD0DC\uB97C \uACB0\uC815\uD569\uB2C8\uB2E4.
- \uBCD1\uC6D0\uC774 \uCE74\uCE74\uC624\uC5D0 \uC5F0\uB3D9\uB418\uC5B4 \uC788\uB2E4\uBA74 \uAC1C\uBCC4 \uC9C4\uB8CC\uD56D\uBAA9\uC774 \uC544\uC9C1 \uCE74\uCE74\uC624\uC5D0 \uB178\uCD9C\uB418\uC9C0 \uC54A\uC558\uB354\uB77C\uB3C4 \uBAA9\uB85D\uC758 \uCE74\uCE74\uC624 \uCC44\uB110 \uC815\uBCF4\uC640 \uC608\uC57D \uC2E0\uCCAD \uB0B4\uC5ED\uC758 \uCC44\uB110 \uC5F4\uC740 \uC720\uC9C0\uD569\uB2C8\uB2E4.
- \uBCD1\uC6D0\uC774 \uCE74\uCE74\uC624\uC5D0 \uC5F0\uB3D9\uB418\uC9C0 \uC54A\uC558\uB2E4\uBA74 \uC704 \uC138 \uD654\uBA74\uC758 \uCE74\uCE74\uC624 \uAD00\uB828 \uC601\uC5ED\uC744 \uD45C\uC2DC\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.
